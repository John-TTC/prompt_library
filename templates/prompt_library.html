<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --danger: #ef4444;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 2;
      width: min(1052px, calc(100% - 20px));
      margin: 0 auto;
    }

    .header-spacer { grid-column: 1; }

    .header-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      text-align: center;
      grid-column: 2;
      justify-self: center;
    }

    .header-title {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
    }

    .header-subtitle {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    .header-actions {
      grid-column: 3;
      justify-self: end;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }

    .user-select-label {
      font-size: 11px;
      color: var(--muted);
    }

    .user-select {
      min-width: 150px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.16s ease-in-out;
      font-size: 13px;
    }

    button:hover {
      border-color: var(--accent);
      background: #283548;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #1d4ed8;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1e40af;
      border-color: #3b82f6;
    }

    .status {
      padding: 8px 18px;
      border-bottom: 1px solid rgba(55, 65, 81, 0.6);
      min-height: 30px;
      width: min(1052px, calc(100% - 20px));
      margin: 0 auto;
    }

    .status-description {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
      text-align: center;
    }

    .list-status {
      font-size: 12px;
      color: #93c5fd;
      min-height: 22px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(107, 114, 128, 0.55);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
    }

    .status-text {
      min-height: 16px;
      line-height: 1.3;
    }

    .status-undo {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 6px;
    }

    .toast {
      position: fixed;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #475569;
      color: #e2e8f0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      max-width: min(420px, 80vw);
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.35);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-color: #b91c1c;
      color: #fecaca;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px minmax(320px, 820px);
      gap: 12px;
      justify-content: center;
      padding: 16px;
      min-height: calc(100vh - 105px);
    }

    .groups-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.88);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 150px);
      min-height: 300px;
    }

    .groups-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      gap: 8px;
    }

    .groups-panel-header button {
      padding: 5px 8px;
      font-size: 11px;
    }

    .groups-scroll {
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .group-item {
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      padding: 8px 10px;
    }

    .group-item.active {
      background: #1e3a8a;
      border-color: #3b82f6;
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.35);
    }

    .group-item.drop-target {
      border-color: #93c5fd;
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.7);
      background: #243244;
    }

    .group-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-count {
      color: var(--muted);
      font-size: 11px;
      flex-shrink: 0;
    }

    .list-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.88);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 150px);
      min-height: 300px;
    }

    .list-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .list-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-controls input {
      width: 230px;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 6px;
    }

    .blocks-scroll {
      overflow: auto;
      padding: 8px 10px 14px;
      flex: 1;
    }

    .block-card {
      border: 1px solid #6b7280;
      border-radius: 10px;
      margin-top: 10px;
      background: #374151;
      overflow: hidden;
      cursor: grab;
      transition: box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .block-card.dragging {
      opacity: 0.55;
      cursor: grabbing;
      box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.7);
    }

    .block-card.drop-before {
      box-shadow: inset 0 3px 0 #93c5fd;
    }

    .block-card.drop-after {
      box-shadow: inset 0 -3px 0 #93c5fd;
    }

    .block-card:first-child {
      margin-top: 0;
    }

    .block-header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 10px 12px 8px;
      align-items: start;
    }

    .block-title-wrap {
      min-width: 0;
    }

    .block-title {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      word-break: break-word;
    }

    .block-description {
      margin: 6px 0 0;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.35;
      max-width: 680px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .block-meta {
      margin-top: 7px;
    }

    .group-badge {
      display: inline-block;
      font-size: 11px;
      border: 1px solid #475569;
      border-radius: 999px;
      padding: 2px 7px;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.45);
    }

    .row-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-self: end;
      align-self: start;
      flex-wrap: nowrap;
    }

    .row-actions button {
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-danger:hover {
      border-color: #f87171;
      color: #fecaca;
    }

    .arrow-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      line-height: 1;
      border-radius: 8px;
      user-select: none;
    }

    .arrow-btn[aria-expanded="true"] {
      background: #1e3a8a;
      border-color: #3b82f6;
    }

    .context-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.2s ease;
      border-top: 1px solid transparent;
    }

    .context-body.open {
      max-height: 340px;
      border-top-color: var(--border);
    }

    .context-body-inner {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .context-collapse-hitarea {
      height: 4px;
      width: 100%;
    }

    .context-text {
      background: #030712;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #d1d5db;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 220px;
      font-size: 12px;
      line-height: 1.4;
    }

    .prompt-inline-editor {
      min-height: 190px;
      background: #030712;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #d1d5db;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
      resize: vertical;
    }

    .prompt-action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .prompt-action-bar button {
      font-size: 12px;
      padding: 6px 10px;
    }

    .prompt-inline-editor.is-dirty {
      border-color: #60a5fa;
      background: rgba(30, 58, 138, 0.12);
    }

    .empty-state {
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 18px;
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
    }

    dialog {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0f172a;
      color: var(--text);
      width: min(760px, 92vw);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(2, 6, 23, 0.6);
      backdrop-filter: blur(2px);
    }

    .dialog-content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dialog-title {
      margin: 0;
      font-size: 18px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111827;
      color: var(--text);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }

    textarea.context-input {
      min-height: 180px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 760px) {
      .app-header { grid-template-columns: 1fr; }
      .header-spacer { display: none; }
      .header-title-wrap { grid-column: 1; }
      .header-actions {
        grid-column: 1;
        justify-self: center;
      }
      .layout { grid-template-columns: 1fr; }
      .groups-panel { max-height: 210px; min-height: 140px; }
      .list-controls input { width: 100%; }
      .list-panel-header { flex-direction: column; align-items: stretch; gap: 8px; }
      .list-panel { max-height: unset; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-spacer" aria-hidden="true"></div>
    <div class="header-title-wrap">
      <h1 class="header-title">Prompt Library</h1>
      <p class="header-subtitle">Manages your favorite LLM session directives</p>
    </div>
    <div class="header-actions">
      <label class="user-select-label" for="userSelect">Active user</label>
      <select id="userSelect" class="user-select"></select>
    </div>
  </header>

  <div class="status">
    <div class="status-description">
      Allows you to save and retrieve reusable prompt blocks for quick paste into LLM sessions in order to establish a consistent session setup
    </div>
  </div>

  <main class="layout">
    <aside class="groups-panel">
      <div class="groups-panel-header">
        <span>Groups</span>
        <button id="btnAddGroup" type="button">+ Group</button>
      </div>
      <div id="groupsContainer" class="groups-scroll"></div>
    </aside>
    <section class="list-panel">
      <div class="list-panel-header">
        <span id="countLabel">0 prompts</span>
        <div class="list-controls">
          <input id="searchInput" type="search" placeholder="Search prompts..." />
          <button id="btnAdd" class="btn-primary">+ New Prompt</button>
        </div>
      </div>
      <div id="statusMessage" class="list-status">
        <span id="statusText" class="status-text"></span>
        <button id="btnUndoStatus" class="status-undo" type="button" hidden>Undo</button>
      </div>
      <div id="blocksContainer" class="blocks-scroll"></div>
    </section>
  </main>

  <dialog id="contextDialog">
    <form id="contextForm" method="dialog" class="dialog-content">
      <h2 id="dialogTitle" class="dialog-title">New Prompt</h2>

      <label>
        Name
        <input id="nameInput" name="name" maxlength="120" required />
      </label>

      <label>
        Description
        <textarea id="descriptionInput" name="description" rows="4" maxlength="800" required></textarea>
      </label>

      <label>
        Group
        <select id="groupSelect" name="group"></select>
      </label>

      <label>
        Full Prompt
        <textarea id="contextInput" class="context-input" name="context" required></textarea>
      </label>

      <div class="dialog-actions">
        <button type="button" id="btnCancelDialog">Cancel</button>
        <button type="submit" class="btn-primary" id="btnSaveDialog">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="choiceDialog">
    <form id="choiceForm" method="dialog" class="dialog-content">
      <h2 id="choiceTitle" class="dialog-title">Confirm</h2>
      <p id="choiceMessage" style="margin: 0; color: #cbd5e1; font-size: 14px;"></p>
      <div class="dialog-actions">
        <button type="button" id="choiceBtnSecondary"></button>
        <button type="button" id="choiceBtnPrimary" class="btn-primary"></button>
        <button type="button" id="choiceBtnTertiary"></button>
      </div>
    </form>
  </dialog>

  <script>
    (() => {
      "use strict";

      const dom = {
        statusText: document.getElementById("statusText"),
        btnUndoStatus: document.getElementById("btnUndoStatus"),
        countLabel: document.getElementById("countLabel"),
        blocksContainer: document.getElementById("blocksContainer"),
        groupsContainer: document.getElementById("groupsContainer"),
        searchInput: document.getElementById("searchInput"),
        btnAddGroup: document.getElementById("btnAddGroup"),
        btnAdd: document.getElementById("btnAdd"),
        contextDialog: document.getElementById("contextDialog"),
        contextForm: document.getElementById("contextForm"),
        dialogTitle: document.getElementById("dialogTitle"),
        nameInput: document.getElementById("nameInput"),
        descriptionInput: document.getElementById("descriptionInput"),
        contextInput: document.getElementById("contextInput"),
        groupSelect: document.getElementById("groupSelect"),
        btnCancelDialog: document.getElementById("btnCancelDialog"),
        userSelect: document.getElementById("userSelect"),
        choiceDialog: document.getElementById("choiceDialog"),
        choiceTitle: document.getElementById("choiceTitle"),
        choiceMessage: document.getElementById("choiceMessage"),
        choiceBtnPrimary: document.getElementById("choiceBtnPrimary"),
        choiceBtnSecondary: document.getElementById("choiceBtnSecondary"),
        choiceBtnTertiary: document.getElementById("choiceBtnTertiary"),
      };

      const GROUP_ALL_ID = "__all__";
      const DEFAULT_GROUP_ID = "group-unsorted";
      const PROFILE_STORAGE_KEY = "promptLibrary.activeProfile";
      const GROUP_STORAGE_KEY = "promptLibrary.activeGroups";

      const state = {
        configuredUsers: [{ id: "default", label: "Default" }],
        profiles: {},
        groups: {},
        activeProfile: "default",
        activeGroupByProfile: {},
        searchByProfile: {},
        editingId: null,
        undoSnapshot: null,
        undoStatusMessage: "",
      };

      const dragState = {
        draggedId: null,
      };

      function initProfileState(profileId) {
        if (!state.profiles[profileId]) state.profiles[profileId] = [];
        if (!state.groups[profileId]) {
          state.groups[profileId] = ensureDefaultGroup([]);
        } else {
          state.groups[profileId] = ensureDefaultGroup(state.groups[profileId]);
        }
        if (!state.activeGroupByProfile[profileId]) {
          state.activeGroupByProfile[profileId] = GROUP_ALL_ID;
        }
        if (typeof state.searchByProfile[profileId] !== "string") {
          state.searchByProfile[profileId] = "";
        }
      }

      function getActiveUserDef() {
        return (
          state.configuredUsers.find((user) => user.id === state.activeProfile) ||
          state.configuredUsers[0] ||
          { id: "default", label: "Default" }
        );
      }

      async function loadAppConfig() {
        const response = await fetch("/app-config", { cache: "no-store" });
        if (!response.ok) throw new Error("Config load failed");
        const parsed = await response.json();
        const usersRaw =
          parsed && Array.isArray(parsed.users) ? parsed.users : [];
        const cleaned = [];
        for (const entry of usersRaw) {
          if (!entry || typeof entry !== "object") continue;
          const id = typeof entry.id === "string" ? entry.id.trim() : "";
          const label =
            typeof entry.label === "string" ? entry.label.trim() : "";
          if (!id || !label) continue;
          cleaned.push({ id, label });
        }
        state.configuredUsers =
          cleaned.length > 0 ? cleaned : [{ id: "default", label: "Default" }];
      }

      async function loadFromServer() {
        const response = await fetch("/data", { cache: "no-store" });
        if (!response.ok) throw new Error("Load failed");
        const parsed = await response.json();
        const hasUsersObject =
          parsed &&
          typeof parsed === "object" &&
          parsed.users &&
          typeof parsed.users === "object";

        const fallbackUserEntries = hasUsersObject
          ? Object.entries(parsed.users).filter(
              ([, value]) => value && typeof value === "object"
            )
          : [];
        const usedFallbackKeys = new Set();

        for (const user of state.configuredUsers) {
          initProfileState(user.id);
          let userRaw = [];
          if (hasUsersObject) {
            userRaw = parsed.users[user.id];
            if (!userRaw && user.id === "john" && parsed.users.john) {
              userRaw = parsed.users.john;
              usedFallbackKeys.add("john");
            }
            if (!userRaw && user.id === "kathy" && parsed.users.kathy) {
              userRaw = parsed.users.kathy;
              usedFallbackKeys.add("kathy");
            }
            if (!userRaw) {
              const fallback = fallbackUserEntries.find(
                ([key]) => !usedFallbackKeys.has(key)
              );
              if (fallback) {
                userRaw = fallback[1];
                usedFallbackKeys.add(fallback[0]);
              }
            }
          } else if (parsed && typeof parsed === "object") {
            userRaw =
              user.id === state.configuredUsers[0].id ? parsed.blocks : [];
          }
          const userData = normalizeUserData(userRaw);
          state.groups[user.id] = userData.groups;
          state.profiles[user.id] = userData.blocks;
        }
      }

      async function saveToServer() {
        const response = await fetch("/data", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(getPayload()),
        });
        if (!response.ok) throw new Error("Save failed");
      }

      function cloneBlocks(blocks) {
        return blocks.map((block) => ({ ...block }));
      }

      function withReindexedOrder(items) {
        return items.map((item, idx) => ({
          ...item,
          order: idx,
        }));
      }

      function getActiveBlocks() {
        return state.profiles[state.activeProfile] || [];
      }

      function setActiveBlocks(blocks) {
        state.profiles[state.activeProfile] = blocks;
      }

      function getActiveGroups() {
        return state.groups[state.activeProfile] || [];
      }

      function setActiveGroups(groups) {
        state.groups[state.activeProfile] = groups;
      }

      function getActiveGroupId() {
        return state.activeGroupByProfile[state.activeProfile] || GROUP_ALL_ID;
      }

      function setActiveGroupId(groupId) {
        state.activeGroupByProfile[state.activeProfile] = groupId;
      }

      function getActiveProfileLabel() {
        return getActiveUserDef().label;
      }

      function renderUserSelect() {
        dom.userSelect.innerHTML = "";
        for (const user of state.configuredUsers) {
          const option = document.createElement("option");
          option.value = user.id;
          option.textContent = user.label;
          dom.userSelect.appendChild(option);
        }
        dom.userSelect.value = state.activeProfile;
      }

      function saveActiveProfileLocal() {
        try {
          window.localStorage.setItem(PROFILE_STORAGE_KEY, state.activeProfile);
        } catch (_err) {
          // Ignore storage failures (private mode / blocked storage).
        }
      }

      function loadActiveProfileLocal() {
        try {
          const saved = window.localStorage.getItem(PROFILE_STORAGE_KEY);
          if (
            saved &&
            state.configuredUsers.some((user) => user.id === saved)
          ) {
            state.activeProfile = saved;
          }
        } catch (_err) {
          // Ignore storage failures and keep default profile.
        }
      }

      function saveActiveGroupsLocal() {
        try {
          window.localStorage.setItem(
            GROUP_STORAGE_KEY,
            JSON.stringify(state.activeGroupByProfile)
          );
        } catch (_err) {
          // Ignore storage failures (private mode / blocked storage).
        }
      }

      function loadActiveGroupsLocal() {
        try {
          const raw = window.localStorage.getItem(GROUP_STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            for (const user of state.configuredUsers) {
              if (typeof parsed[user.id] === "string") {
                state.activeGroupByProfile[user.id] = parsed[user.id];
              }
            }
          }
        } catch (_err) {
          // Ignore storage failures and keep defaults.
        }
      }

      function switchProfile(profileId) {
        if (!state.configuredUsers.some((user) => user.id === profileId)) return;
        if (state.activeProfile === profileId) return;
        state.activeProfile = profileId;
        initProfileState(profileId);
        state.editingId = null;
        clearUndoSnapshot();
        if (dom.contextDialog.open) {
          closeDialog();
        }
        ensureActiveGroupIsValid();
        renderUserSelect();
        saveActiveProfileLocal();
        syncSearchInputFromState();
        render();
        setStatus(
          `Viewing ${getActiveProfileLabel()}'s prompts in ${getActiveGroupLabel()}`
        );
      }

      function setUndoSnapshot(snapshot, undoStatusMessage) {
        state.undoSnapshot = snapshot && snapshot.length >= 0 ? snapshot : null;
        state.undoStatusMessage = undoStatusMessage || "Undid last action";
        dom.btnUndoStatus.hidden = !state.undoSnapshot;
      }

      function clearUndoSnapshot() {
        state.undoSnapshot = null;
        state.undoStatusMessage = "";
        dom.btnUndoStatus.hidden = true;
      }

      function setStatus(message, isError = false) {
        const normalizedMessage =
          typeof message === "string" ? message.replace(/\.$/, "") : "";
        dom.statusText.textContent = normalizedMessage;
        dom.statusText.style.color = isError ? "#fca5a5" : "#93c5fd";
      }

      function truncateStatusName(name, maxLen = 30) {
        const safeName = typeof name === "string" ? name : "";
        if (safeName.length <= maxLen) return safeName;
        return `${safeName.slice(0, maxLen)}...`;
      }

      function generateId(prefix = "ctx") {
        return (
          prefix +
          "-" +
          Date.now().toString(36) +
          "-" +
          Math.random().toString(36).slice(2, 7)
        );
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function sanitizeLoadedGroups(value) {
        if (!Array.isArray(value)) return [];
        const cleaned = [];
        for (const entry of value) {
          if (!entry || typeof entry !== "object") continue;
          const name = typeof entry.name === "string" ? entry.name.trim() : "";
          if (!name) continue;
          cleaned.push({
            id: typeof entry.id === "string" ? entry.id : generateId("grp"),
            name,
            createdAt:
              typeof entry.createdAt === "string" ? entry.createdAt : nowIso(),
            order:
              typeof entry.order === "number" && Number.isFinite(entry.order)
                ? entry.order
                : cleaned.length,
          });
        }
        cleaned.sort((a, b) => a.order - b.order);
        return cleaned;
      }

      function ensureDefaultGroup(groups) {
        const existing = groups.find((g) => g.id === DEFAULT_GROUP_ID);
        if (existing) return groups;
        return [
          ...groups,
          {
            id: DEFAULT_GROUP_ID,
            name: "Unsorted",
            createdAt: nowIso(),
            order: groups.length,
          },
        ];
      }

      function sanitizeLoadedBlocks(value, groups) {
        if (!Array.isArray(value)) return [];
        const groupIds = new Set(groups.map((g) => g.id));
        const cleaned = [];
        for (const entry of value) {
          if (!entry || typeof entry !== "object") continue;
          const name = typeof entry.name === "string" ? entry.name.trim() : "";
          const description =
            typeof entry.description === "string" ? entry.description.trim() : "";
          const contextText =
            typeof entry.contextText === "string" ? entry.contextText : "";
          if (!name || !description || !contextText.trim()) continue;

          const rawGroupId =
            typeof entry.groupId === "string"
              ? entry.groupId
              : typeof entry.collectionId === "string"
                ? entry.collectionId
                : "";
          const groupId = groupIds.has(rawGroupId) ? rawGroupId : DEFAULT_GROUP_ID;

          cleaned.push({
            id: typeof entry.id === "string" ? entry.id : generateId("ctx"),
            name,
            description,
            contextText,
            groupId,
            createdAt:
              typeof entry.createdAt === "string" ? entry.createdAt : nowIso(),
            updatedAt:
              typeof entry.updatedAt === "string" ? entry.updatedAt : nowIso(),
            order:
              typeof entry.order === "number" && Number.isFinite(entry.order)
                ? entry.order
                : cleaned.length,
          });
        }
        cleaned.sort((a, b) => a.order - b.order);
        return cleaned;
      }

      function normalizeUserData(raw) {
        let groupsRaw = [];
        let blocksRaw = [];

        if (Array.isArray(raw)) {
          blocksRaw = raw;
        } else if (raw && typeof raw === "object") {
          if (Array.isArray(raw.groups)) groupsRaw = raw.groups;
          if (Array.isArray(raw.blocks)) blocksRaw = raw.blocks;
          else if (Array.isArray(raw.prompts)) blocksRaw = raw.prompts;
        }

        let groups = sanitizeLoadedGroups(groupsRaw);
        groups = ensureDefaultGroup(groups);
        const blocks = sanitizeLoadedBlocks(blocksRaw, groups);
        return { groups, blocks };
      }

      function getPayload() {
        const usersPayload = {};
        for (const user of state.configuredUsers) {
          initProfileState(user.id);
          usersPayload[user.id] = {
            groups: withReindexedOrder(state.groups[user.id]),
            blocks: withReindexedOrder(state.profiles[user.id]),
          };
        }
        return {
          schemaVersion: 3,
          exportedAt: nowIso(),
          users: usersPayload,
        };
      }

      function getGroupById(groupId) {
        return getActiveGroups().find((group) => group.id === groupId) || null;
      }

      function getGroupLabel(groupId) {
        if (groupId === GROUP_ALL_ID) return "All prompts";
        const group = getGroupById(groupId);
        return group ? group.name : "Unsorted";
      }

      function getActiveGroupLabel() {
        return getGroupLabel(getActiveGroupId());
      }

      function ensureActiveGroupIsValid() {
        const groupId = getActiveGroupId();
        if (groupId === GROUP_ALL_ID) return;
        const exists = getActiveGroups().some((group) => group.id === groupId);
        if (!exists) {
          setActiveGroupId(GROUP_ALL_ID);
        }
      }

      function getActiveSearchTerm() {
        return state.searchByProfile[state.activeProfile] || "";
      }

      function syncSearchInputFromState() {
        dom.searchInput.value = getActiveSearchTerm();
      }

      function getVisibleBlocks() {
        const allBlocks = getActiveBlocks();
        const selectedGroupId = getActiveGroupId();
        const query = getActiveSearchTerm().trim().toLowerCase();

        return allBlocks.filter((block) => {
          const inGroup =
            selectedGroupId === GROUP_ALL_ID || block.groupId === selectedGroupId;
          if (!inGroup) return false;
          if (!query) return true;
          return (
            block.name.toLowerCase().includes(query) ||
            block.description.toLowerCase().includes(query) ||
            block.contextText.toLowerCase().includes(query)
          );
        });
      }

      function updateCountLabel() {
        const visibleCount = getVisibleBlocks().length;
        const itemLabel = visibleCount === 1 ? "1 prompt" : `${visibleCount} prompts`;
        const searchLabel = getActiveSearchTerm().trim() ? " - filtered" : "";
        dom.countLabel.textContent =
          `${itemLabel} in ${getActiveGroupLabel()} (${getActiveProfileLabel()})${searchLabel}`;
      }

      function renderGroups() {
        dom.groupsContainer.innerHTML = "";
        const allBlocksCount = getActiveBlocks().length;

        const allButton = document.createElement("button");
        allButton.type = "button";
        allButton.className =
          "group-item" + (getActiveGroupId() === GROUP_ALL_ID ? " active" : "");
        allButton.innerHTML =
          `<span class="group-name">All prompts</span><span class="group-count">${allBlocksCount}</span>`;
        allButton.addEventListener("click", () => {
          if (getActiveGroupId() === GROUP_ALL_ID) return;
          setActiveGroupId(GROUP_ALL_ID);
          saveActiveGroupsLocal();
          render();
          setStatus(`Showing all prompts for ${getActiveProfileLabel()}`);
        });
        wireGroupDropTarget(allButton, GROUP_ALL_ID);
        dom.groupsContainer.appendChild(allButton);

        for (const group of getActiveGroups()) {
          const groupCount = getActiveBlocks().filter(
            (block) => block.groupId === group.id
          ).length;
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "group-item" + (getActiveGroupId() === group.id ? " active" : "");
          button.innerHTML =
            `<span class="group-name">${escapeHtml(group.name)}</span><span class="group-count">${groupCount}</span>`;
          button.addEventListener("click", () => {
            if (getActiveGroupId() === group.id) return;
            setActiveGroupId(group.id);
            saveActiveGroupsLocal();
            render();
            setStatus(`Viewing ${getActiveProfileLabel()}'s ${group.name} prompts`);
          });
          wireGroupDropTarget(button, group.id);
          dom.groupsContainer.appendChild(button);
        }
      }

      function wireGroupDropTarget(element, groupId) {
        element.addEventListener("dragover", (event) => {
          if (!dragState.draggedId) return;
          if (groupId === GROUP_ALL_ID) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
          element.classList.add("drop-target");
        });

        element.addEventListener("dragleave", (event) => {
          const related = event.relatedTarget;
          if (related && element.contains(related)) return;
          element.classList.remove("drop-target");
        });

        element.addEventListener("drop", (event) => {
          if (!dragState.draggedId) return;
          event.preventDefault();
          element.classList.remove("drop-target");
          if (groupId === GROUP_ALL_ID) {
            setStatus("Drop on a specific group to move a prompt");
            return;
          }
          moveBlockToGroup(dragState.draggedId, groupId);
          clearDropMarkers();
        });
      }

      function createBlockElement(block) {
        const card = document.createElement("article");
        card.className = "block-card";
        card.dataset.id = block.id;
        card.draggable = true;

        const header = document.createElement("div");
        header.className = "block-header";

        const titleWrap = document.createElement("div");
        titleWrap.className = "block-title-wrap";
        const title = document.createElement("h3");
        title.className = "block-title";
        title.textContent = block.name;

        const description = document.createElement("p");
        description.className = "block-description";
        description.textContent = block.description;

        const meta = document.createElement("div");
        meta.className = "block-meta";
        const badge = document.createElement("span");
        badge.className = "group-badge";
        badge.textContent = getGroupLabel(block.groupId);
        meta.appendChild(badge);

        titleWrap.appendChild(title);
        titleWrap.appendChild(description);
        titleWrap.appendChild(meta);

        const arrowBtn = document.createElement("button");
        arrowBtn.className = "arrow-btn";
        arrowBtn.type = "button";
        arrowBtn.draggable = false;
        arrowBtn.title = "Expand / Collapse";
        arrowBtn.setAttribute("aria-expanded", "false");
        arrowBtn.innerHTML = "&#9662;";

        header.appendChild(arrowBtn);
        header.appendChild(titleWrap);

        const rowActions = document.createElement("div");
        rowActions.className = "row-actions";

        const quickCopyBtn = document.createElement("button");
        quickCopyBtn.type = "button";
        quickCopyBtn.draggable = false;
        quickCopyBtn.textContent = "Copy";
        quickCopyBtn.title = "Copy full prompt to clipboard";

        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.draggable = false;
        editBtn.textContent = "Edit";

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.draggable = false;
        deleteBtn.className = "btn-danger";
        deleteBtn.textContent = "Delete";

        rowActions.appendChild(quickCopyBtn);
        rowActions.appendChild(editBtn);
        rowActions.appendChild(deleteBtn);
        header.appendChild(rowActions);

        const body = document.createElement("div");
        body.className = "context-body";

        const collapseHitarea = document.createElement("div");
        collapseHitarea.className = "context-collapse-hitarea";

        const bodyInner = document.createElement("div");
        bodyInner.className = "context-body-inner";

        const promptEditor = document.createElement("textarea");
        promptEditor.className = "prompt-inline-editor";
        promptEditor.value = block.contextText;
        promptEditor.setAttribute("aria-label", `Prompt text for ${block.name}`);

        const promptActionBar = document.createElement("div");
        promptActionBar.className = "prompt-action-bar";

        const savePromptBtn = document.createElement("button");
        savePromptBtn.type = "button";
        savePromptBtn.draggable = false;
        savePromptBtn.className = "btn-primary";
        savePromptBtn.textContent = "Save";
        savePromptBtn.disabled = true;

        const copyPromptBtn = document.createElement("button");
        copyPromptBtn.type = "button";
        copyPromptBtn.draggable = false;
        copyPromptBtn.textContent = "Copy to Clipboard";

        const cancelPromptBtn = document.createElement("button");
        cancelPromptBtn.type = "button";
        cancelPromptBtn.draggable = false;
        cancelPromptBtn.textContent = "Cancel";
        cancelPromptBtn.disabled = true;

        promptActionBar.appendChild(savePromptBtn);
        promptActionBar.appendChild(copyPromptBtn);
        promptActionBar.appendChild(cancelPromptBtn);

        bodyInner.appendChild(promptEditor);
        bodyInner.appendChild(promptActionBar);
        body.appendChild(collapseHitarea);
        body.appendChild(bodyInner);

        let savedPromptText = block.contextText;
        let isPromptDirty = false;

        function updateInlinePromptState() {
          savePromptBtn.disabled = !isPromptDirty;
          cancelPromptBtn.disabled = !isPromptDirty;
          promptEditor.classList.toggle("is-dirty", isPromptDirty);
        }

        function refreshDirtyFlag() {
          isPromptDirty = promptEditor.value !== savedPromptText;
          updateInlinePromptState();
        }

        async function persistInlinePromptText() {
          refreshDirtyFlag();
          if (!isPromptDirty) return true;

          const activeBlocks = getActiveBlocks();
          const idx = activeBlocks.findIndex((item) => item.id === block.id);
          if (idx < 0) return false;

          const previousBlocks = cloneBlocks(activeBlocks);
          activeBlocks[idx] = {
            ...activeBlocks[idx],
            contextText: promptEditor.value,
            updatedAt: nowIso(),
          };
          setActiveBlocks(activeBlocks);
          block.contextText = promptEditor.value;
          savedPromptText = promptEditor.value;
          isPromptDirty = false;
          updateInlinePromptState();
          setUndoSnapshot(
            previousBlocks,
            `Restored "${truncateStatusName(block.name)}"`
          );

          try {
            await saveToServer();
            setStatus(`Saved "${truncateStatusName(block.name)}"`);
            return true;
          } catch (_err) {
            setStatus("Autosave failed: Server may not be running", true);
            return false;
          }
        }

        async function confirmDiscardPromptChanges() {
          if (!isPromptDirty) return true;
          const choice = await askChoiceDialog({
            title: "Discard changes?",
            message: "You have unsaved changes.",
            primaryLabel: "Discard Changes",
            secondaryLabel: "Keep Editing",
          });
          if (choice !== "primary") return false;
          promptEditor.value = savedPromptText;
          isPromptDirty = false;
          updateInlinePromptState();
          return true;
        }

        async function copyPromptTextWithDirtyHandling(anchorEl) {
          refreshDirtyFlag();
          if (!isPromptDirty) {
            await copyText(
              promptEditor.value,
              `Copied "${block.name}" to clipboard.`,
              anchorEl
            );
            return;
          }

          const choice = await askChoiceDialog({
            title: "You have unsaved changes.",
            message: "Choose how to copy this prompt text.",
            primaryLabel: "Save and Copy",
            secondaryLabel: "Cancel",
            tertiaryLabel: "Copy Without Saving",
          });

          if (choice === "primary") {
            const saved = await persistInlinePromptText();
            if (!saved) return;
            await copyText(
              promptEditor.value,
              `Copied "${block.name}" to clipboard.`,
              anchorEl
            );
            return;
          }

          if (choice === "tertiary") {
            await copyText(
              promptEditor.value,
              `Copied "${block.name}" to clipboard.`,
              anchorEl
            );
          }
        }

        function syncCardDraggable() {
          card.draggable = !body.classList.contains("open");
        }

        async function setExpanded(isOpen) {
          if (!isOpen && body.classList.contains("open")) {
            const okToClose = await confirmDiscardPromptChanges();
            if (!okToClose) return;
          }
          body.classList.toggle("open", isOpen);
          arrowBtn.setAttribute("aria-expanded", String(isOpen));
          arrowBtn.innerHTML = isOpen ? "&#9652;" : "&#9662;";
          syncCardDraggable();
        }

        arrowBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          void setExpanded(!body.classList.contains("open"));
        });

        card.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;
          if (target.closest("button")) return;
          if (target.closest(".row-actions")) return;
          if (target.closest(".context-body")) return;
          void setExpanded(!body.classList.contains("open"));
        });

        quickCopyBtn.addEventListener("click", (event) =>
          copyText(block.contextText, `Copied "${block.name}" to clipboard.`, event.currentTarget)
        );

        savePromptBtn.addEventListener("click", () => {
          void persistInlinePromptText();
        });
        copyPromptBtn.addEventListener("click", () => {
          void copyPromptTextWithDirtyHandling(copyPromptBtn);
        });
        cancelPromptBtn.addEventListener("click", () => {
          void confirmDiscardPromptChanges();
        });
        promptEditor.addEventListener("input", refreshDirtyFlag);

        editBtn.addEventListener("click", () => openEditDialog(block.id));
        deleteBtn.addEventListener("click", () => deleteBlock(block.id));

        card.addEventListener("dragstart", (event) => {
          if (body.classList.contains("open")) {
            event.preventDefault();
            return;
          }
          if (
            event.target &&
            (event.target.closest("button") ||
              event.target.closest("textarea") ||
              event.target.closest("input") ||
              event.target.closest("select"))
          ) {
            event.preventDefault();
            return;
          }
          dragState.draggedId = block.id;
          card.classList.add("dragging");
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", block.id);
          }
        });

        card.addEventListener("dragover", (event) => {
          if (!dragState.draggedId || dragState.draggedId === block.id) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
          const rect = card.getBoundingClientRect();
          const insertBefore = event.clientY < rect.top + rect.height / 2;
          updateDropMarker(card, insertBefore);
        });

        card.addEventListener("dragleave", (event) => {
          if (event.currentTarget !== card) return;
          const related = event.relatedTarget;
          if (related && card.contains(related)) return;
          card.classList.remove("drop-before", "drop-after");
        });

        card.addEventListener("drop", (event) => {
          if (!dragState.draggedId || dragState.draggedId === block.id) return;
          event.preventDefault();
          const rect = card.getBoundingClientRect();
          const insertBefore = event.clientY < rect.top + rect.height / 2;
          moveBlock(dragState.draggedId, block.id, insertBefore);
          clearDropMarkers();
        });

        card.addEventListener("dragend", () => {
          dragState.draggedId = null;
          card.classList.remove("dragging");
          clearDropMarkers();
        });

        card.appendChild(header);
        card.appendChild(body);
        syncCardDraggable();
        return card;
      }

      function render() {
        dom.blocksContainer.innerHTML = "";
        ensureActiveGroupIsValid();
        renderGroups();
        updateCountLabel();
        const activeBlocks = getVisibleBlocks();

        if (!activeBlocks.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          if (getActiveSearchTerm().trim()) {
            empty.textContent =
              `No prompts match "${getActiveSearchTerm().trim()}" in ${getActiveGroupLabel()}.`;
          } else if (getActiveGroupId() === GROUP_ALL_ID) {
            empty.textContent =
              `No prompts yet for ${getActiveProfileLabel()}. Use + New Prompt to create one.`;
          } else {
            empty.textContent =
              `No prompts yet in ${getActiveGroupLabel()}. Use + New Prompt to create one.`;
          }
          dom.blocksContainer.appendChild(empty);
          return;
        }

        for (const block of activeBlocks) {
          dom.blocksContainer.appendChild(createBlockElement(block));
        }
      }

      function clearDropMarkers() {
        const marked = dom.blocksContainer.querySelectorAll(".drop-before, .drop-after");
        for (const node of marked) {
          node.classList.remove("drop-before", "drop-after");
        }
        const groupMarked = dom.groupsContainer.querySelectorAll(".drop-target");
        for (const node of groupMarked) {
          node.classList.remove("drop-target");
        }
      }

      function updateDropMarker(card, insertBefore) {
        clearDropMarkers();
        card.classList.add(insertBefore ? "drop-before" : "drop-after");
      }

      async function persistWithStatus(successMessage, errorMessage = "Autosave failed: Server may not be running") {
        try {
          await saveToServer();
          setStatus(successMessage);
        } catch (_err) {
          setStatus(errorMessage, true);
        }
      }

      function moveBlock(draggedId, targetId, insertBefore) {
        if (draggedId === targetId) return;
        const activeBlocks = getActiveBlocks();

        const dragIndex = activeBlocks.findIndex((b) => b.id === draggedId);
        const targetIndex = activeBlocks.findIndex((b) => b.id === targetId);
        if (dragIndex < 0 || targetIndex < 0) return;

        const previousBlocks = cloneBlocks(activeBlocks);
        const [draggedBlock] = activeBlocks.splice(dragIndex, 1);
        const liveTargetIndex = activeBlocks.findIndex((b) => b.id === targetId);
        const insertIndex = insertBefore ? liveTargetIndex : liveTargetIndex + 1;
        activeBlocks.splice(insertIndex, 0, draggedBlock);
        setActiveBlocks(activeBlocks);

        setUndoSnapshot(previousBlocks, "Previous order restored");
        render();
        void persistWithStatus(
          `Changed order of "${truncateStatusName(draggedBlock.name)}"`
        );
      }

      function moveBlockToGroup(draggedId, targetGroupId) {
        const activeBlocks = getActiveBlocks();
        const dragIndex = activeBlocks.findIndex((block) => block.id === draggedId);
        if (dragIndex < 0) return;
        const draggedBlock = activeBlocks[dragIndex];
        if (!draggedBlock) return;
        if (draggedBlock.groupId === targetGroupId) {
          setStatus(`"${truncateStatusName(draggedBlock.name)}" is already in ${getGroupLabel(targetGroupId)}`);
          return;
        }

        const previousBlocks = cloneBlocks(activeBlocks);
        const [moved] = activeBlocks.splice(dragIndex, 1);
        moved.groupId = targetGroupId;
        moved.updatedAt = nowIso();
        activeBlocks.push(moved);
        setActiveBlocks(activeBlocks);

        setUndoSnapshot(
          previousBlocks,
          `Restored "${truncateStatusName(moved.name)}" to ${getGroupLabel(previousBlocks[dragIndex].groupId || DEFAULT_GROUP_ID)}`
        );
        render();
        void persistWithStatus(
          `Moved "${truncateStatusName(moved.name)}" to ${getGroupLabel(targetGroupId)}`
        );
      }

      async function copyText(text, successMsg, anchorEl = null) {
        try {
          await navigator.clipboard.writeText(text);
          showToast(successMsg, false, 1400, anchorEl);
        } catch (_err) {
          const ok = fallbackCopyText(text);
          if (ok) showToast(successMsg, false, 1400, anchorEl);
          else showToast("Clipboard failed. Copy manually from expanded panel.", true, 1600, anchorEl);
        }
      }

      function showToast(message, isError = false, durationMs = 1400, anchorEl = null) {
        const toast = document.createElement("div");
        toast.className = `toast${isError ? " error" : ""}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        positionToast(toast, anchorEl);
        requestAnimationFrame(() => toast.classList.add("show"));
        window.setTimeout(() => {
          toast.classList.remove("show");
          window.setTimeout(() => toast.remove(), 220);
        }, durationMs);
      }

      function positionToast(toastEl, anchorEl) {
        const margin = 12;
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const toastRect = toastEl.getBoundingClientRect();

        let left = viewportWidth - toastRect.width - 16;
        let top = viewportHeight - toastRect.height - 16;

        if (anchorEl && typeof anchorEl.getBoundingClientRect === "function") {
          const anchorRect = anchorEl.getBoundingClientRect();
          left = anchorRect.right - toastRect.width - 6;
          top = anchorRect.bottom - toastRect.height - 6;
        }

        left = Math.min(Math.max(margin, left), viewportWidth - toastRect.width - margin);
        top = Math.min(Math.max(margin, top), viewportHeight - toastRect.height - margin);

        toastEl.style.left = `${left}px`;
        toastEl.style.top = `${top}px`;
      }

      function fallbackCopyText(text) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "true");
        ta.style.position = "absolute";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();

        let ok = false;
        try {
          ok = document.execCommand("copy");
        } catch (_err) {
          ok = false;
        }

        ta.remove();
        return ok;
      }

      function openNewDialog() {
        state.editingId = null;
        dom.dialogTitle.textContent = "New Prompt";
        dom.contextForm.reset();
        populateGroupSelect();
        dom.contextDialog.showModal();
        dom.nameInput.focus();
      }

      function openEditDialog(blockId) {
        const block = getActiveBlocks().find((b) => b.id === blockId);
        if (!block) return;

        state.editingId = block.id;
        dom.dialogTitle.textContent = "Edit Prompt";
        dom.nameInput.value = block.name;
        dom.descriptionInput.value = block.description;
        dom.contextInput.value = block.contextText;
        populateGroupSelect(block.groupId);
        dom.contextDialog.showModal();
        dom.nameInput.focus();
      }

      function closeDialog() {
        if (dom.contextDialog.open) dom.contextDialog.close();
      }

      function askChoiceDialog({
        title = "Confirm",
        message = "",
        primaryLabel = "OK",
        secondaryLabel = "Cancel",
        tertiaryLabel = "",
      }) {
        return new Promise((resolve) => {
          dom.choiceTitle.textContent = title;
          dom.choiceMessage.textContent = message;
          dom.choiceBtnPrimary.textContent = primaryLabel;
          dom.choiceBtnSecondary.textContent = secondaryLabel;
          dom.choiceBtnTertiary.textContent = tertiaryLabel || "";
          dom.choiceBtnTertiary.hidden = !tertiaryLabel;

          let settled = false;
          const settle = (value) => {
            if (settled) return;
            settled = true;
            if (dom.choiceDialog.open) {
              dom.choiceDialog.close();
            }
            cleanup();
            resolve(value);
          };

          const onPrimary = () => settle("primary");
          const onSecondary = () => settle("secondary");
          const onTertiary = () => settle("tertiary");
          const onCancel = (event) => {
            event.preventDefault();
            settle("secondary");
          };
          const onClose = () => {
            settle("secondary");
          };

          const cleanup = () => {
            dom.choiceBtnPrimary.removeEventListener("click", onPrimary);
            dom.choiceBtnSecondary.removeEventListener("click", onSecondary);
            dom.choiceBtnTertiary.removeEventListener("click", onTertiary);
            dom.choiceDialog.removeEventListener("cancel", onCancel);
            dom.choiceDialog.removeEventListener("close", onClose);
          };

          dom.choiceBtnPrimary.addEventListener("click", onPrimary);
          dom.choiceBtnSecondary.addEventListener("click", onSecondary);
          dom.choiceBtnTertiary.addEventListener("click", onTertiary);
          dom.choiceDialog.addEventListener("cancel", onCancel);
          dom.choiceDialog.addEventListener("close", onClose);
          dom.choiceDialog.showModal();
        });
      }

      function upsertFromDialog() {
        const name = dom.nameInput.value.trim();
        const description = dom.descriptionInput.value.trim();
        const contextText = dom.contextInput.value;
        const selectedGroupId = dom.groupSelect.value || DEFAULT_GROUP_ID;

        if (!name || !description || !contextText.trim()) {
          setStatus("Name, description, and prompt text are required", true);
          return;
        }

        const activeBlocks = getActiveBlocks();
        const previousBlocks = cloneBlocks(activeBlocks);

        if (state.editingId) {
          const idx = activeBlocks.findIndex((b) => b.id === state.editingId);
          if (idx < 0) return;

          const restoredName =
            previousBlocks[idx] && typeof previousBlocks[idx].name === "string"
              ? previousBlocks[idx].name
              : name;

          activeBlocks[idx] = {
            ...activeBlocks[idx],
            name,
            description,
            contextText,
            groupId: selectedGroupId,
            updatedAt: nowIso(),
          };

          setUndoSnapshot(
            previousBlocks,
            `Restored "${truncateStatusName(restoredName)}"`
          );
          setActiveBlocks(activeBlocks);
          render();
          closeDialog();
          void persistWithStatus(`Changed "${truncateStatusName(name)}"`);
        } else {
          const newBlock = {
            id: generateId(),
            name,
            description,
            contextText,
            groupId: selectedGroupId,
            createdAt: nowIso(),
            updatedAt: nowIso(),
            order: activeBlocks.length,
          };

          activeBlocks.push(newBlock);
          setActiveBlocks(activeBlocks);
          setUndoSnapshot(previousBlocks, "Prompt removed");
          render();
          closeDialog();
          void persistWithStatus(`Added "${truncateStatusName(name)}"`);
        }
      }

      function deleteBlock(id) {
        const activeBlocks = getActiveBlocks();
        const block = activeBlocks.find((b) => b.id === id);
        if (!block) return;

        const ok = window.confirm(`Delete "${block.name}"?`);
        if (!ok) return;

        const previousBlocks = cloneBlocks(activeBlocks);
        setActiveBlocks(activeBlocks.filter((b) => b.id !== id));

        setUndoSnapshot(
          previousBlocks,
          `Restored "${truncateStatusName(block.name)}"`
        );
        render();
        void persistWithStatus(`Deleted "${truncateStatusName(block.name)}"`);
      }

      async function undoLastAction() {
        if (!state.undoSnapshot) {
          setStatus("Nothing to undo");
          return;
        }

        setActiveBlocks(cloneBlocks(state.undoSnapshot));
        const undoResultMessage = state.undoStatusMessage || "Undid last action";

        clearUndoSnapshot();
        render();

        try {
          await saveToServer();
          setStatus(undoResultMessage);
        } catch (_err) {
          setStatus("Autosave failed: Server may not be running", true);
        }
      }

      function populateGroupSelect(selectedGroupId = "") {
        dom.groupSelect.innerHTML = "";
        const groups = getActiveGroups();
        let targetId =
          selectedGroupId ||
          (getActiveGroupId() === GROUP_ALL_ID ? DEFAULT_GROUP_ID : getActiveGroupId());
        const validIds = new Set(groups.map((group) => group.id));
        if (!validIds.has(targetId)) {
          targetId = DEFAULT_GROUP_ID;
        }

        for (const group of groups) {
          const option = document.createElement("option");
          option.value = group.id;
          option.textContent = group.name;
          dom.groupSelect.appendChild(option);
        }
        dom.groupSelect.value = targetId;
      }

      function addGroup() {
        const rawName = window.prompt("New group name:");
        if (rawName === null) return;
        const name = rawName.trim();
        if (!name) {
          setStatus("Group name is required", true);
          return;
        }

        const groups = getActiveGroups();
        const existing = groups.find(
          (group) => group.name.toLowerCase() === name.toLowerCase()
        );
        if (existing) {
          setActiveGroupId(existing.id);
          saveActiveGroupsLocal();
          render();
          setStatus(`Using existing group "${truncateStatusName(existing.name)}"`);
          return;
        }

        const nextGroups = [
          ...groups,
          {
            id: generateId("grp"),
            name,
            createdAt: nowIso(),
            order: groups.length,
          },
        ];
        setActiveGroups(nextGroups);
        setActiveGroupId(nextGroups[nextGroups.length - 1].id);
        saveActiveGroupsLocal();
        render();
        void persistWithStatus(`Added group "${truncateStatusName(name)}"`);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function bindEvents() {
        dom.btnAdd.addEventListener("click", openNewDialog);
        dom.btnAddGroup.addEventListener("click", addGroup);
        dom.userSelect.addEventListener("change", () => {
          switchProfile(dom.userSelect.value);
        });
        dom.searchInput.addEventListener("input", () => {
          state.searchByProfile[state.activeProfile] = dom.searchInput.value;
          render();
        });
        dom.btnCancelDialog.addEventListener("click", closeDialog);
        dom.contextForm.addEventListener("submit", (event) => {
          event.preventDefault();
          upsertFromDialog();
        });
        dom.btnUndoStatus.addEventListener("click", () => {
          void undoLastAction();
        });
      }

      async function init() {
        bindEvents();
        try {
          await loadAppConfig();
        } catch (_err) {
          state.configuredUsers = [{ id: "default", label: "Default" }];
          setStatus("Could not load app config; using default user", true);
        }
        for (const user of state.configuredUsers) {
          initProfileState(user.id);
        }
        if (!state.configuredUsers.some((user) => user.id === state.activeProfile)) {
          state.activeProfile = state.configuredUsers[0].id;
        }
        loadActiveProfileLocal();
        loadActiveGroupsLocal();
        if (!state.configuredUsers.some((user) => user.id === state.activeProfile)) {
          state.activeProfile = state.configuredUsers[0].id;
        }
        renderUserSelect();
        try {
          await loadFromServer();
        } catch (_err) {
          for (const user of state.configuredUsers) {
            state.profiles[user.id] = [];
            state.groups[user.id] = ensureDefaultGroup([]);
          }
          setStatus("Could not load from server", true);
        }
        ensureActiveGroupIsValid();
        syncSearchInputFromState();
        render();
        if (!dom.statusText.textContent) {
          setStatus("");
        }
      }

      void init();
    })();
  </script>
</body>
</html>
