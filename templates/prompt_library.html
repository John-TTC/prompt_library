        return card;
      }

      async function toggleAgentExpanded(agentMeta) {
        const key = getAgentKey(
          agentMeta.user,
          agentMeta.group || AGENT_GROUP_UNSORTED_ID,
          agentMeta.agent_slug
        );
        const expandedKeys = state.expandedAgentKeyByProfile[state.activeProfile] || [];
        const isExpanded = expandedKeys.includes(key);
        if (isExpanded) {
          const detail = state.agentDetailsByKey[key] || null;
          const okToCollapse = await confirmDiscardAgentChangesIfNeeded({ detail });
          if (!okToCollapse) return;
          state.expandedAgentKeyByProfile[state.activeProfile] = expandedKeys.filter(
            (item) => item !== key
          );
          render();
          return;
        }

        state.expandedAgentKeyByProfile[state.activeProfile] = [...expandedKeys, key];
        render();
        try {
          await loadAgentDetail(
            agentMeta.user,
            agentMeta.group || AGENT_GROUP_UNSORTED_ID,
            agentMeta.agent_slug
          );
          if (state.activeMode === "agents") {
            render();
          }
        } catch (_err) {
          setStatus("Could not load agent sections", true);
        }
      }

      async function deleteAgentItem(agentMeta) {
        const choice = await askChoiceDialog({
          title: "Delete this agent?",
          message: "This will remove all section files for this agent.",
          primaryLabel: "Delete Agent",
          secondaryLabel: "Cancel",
        });
        if (choice !== "primary") return;

        try {
          const response = await fetch("/agents/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user: agentMeta.user,
              group: agentMeta.group || AGENT_GROUP_UNSORTED_ID,
              agent: agentMeta.agent_slug,
            }),
          });
          if (!response.ok) throw new Error("Delete failed");

          const list = getActiveAgents().filter(
            (item) =>
              !(
                item.user === agentMeta.user &&
                (item.group || AGENT_GROUP_UNSORTED_ID) ===
                  (agentMeta.group || AGENT_GROUP_UNSORTED_ID) &&
                item.agent_slug === agentMeta.agent_slug
              )
          );
          state.agentsByProfile[state.activeProfile] = list;
          const key = getAgentKey(
            agentMeta.user,
            agentMeta.group || AGENT_GROUP_UNSORTED_ID,
            agentMeta.agent_slug
          );
          delete state.agentDetailsByKey[key];
          const expandedKeys = state.expandedAgentKeyByProfile[state.activeProfile] || [];
          state.expandedAgentKeyByProfile[state.activeProfile] = expandedKeys.filter(
            (item) => item !== key
          );
          render();
          setStatus(`Deleted agent "${truncateStatusName(agentMeta.title)}"`);
        } catch (_err) {
          setStatus("Agent delete failed: Server may not be running", true);
        }
      }

      async function saveDirtyAgentSections(agentMeta, detail) {
        if (!detail) return true;
        const dirtySections = Object.keys(detail.dirtyBySection || {}).filter(
          (section) => detail.dirtyBySection[section]
        );
        for (const section of dirtySections) {
          const response = await fetch("/agents/section/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user: agentMeta.user,
              group: agentMeta.group || AGENT_GROUP_UNSORTED_ID,
              agent: agentMeta.agent_slug,
              section,
              content: detail.draftBySection[section] || "",
            }),
          });
          if (!response.ok) {
            return false;
          }
          detail.savedBySection[section] = detail.draftBySection[section] || "";
          detail.dirtyBySection[section] = false;
        }
        return true;
      }

      function buildConstructedPrompt(detail, sectionNames, useSavedValues) {
        const sourceMap = useSavedValues ? detail.savedBySection : detail.draftBySection;
        const lines = [];
        for (const section of sectionNames) {
          const raw = (sourceMap[section] || "").replace(/\r\n/g, "\n");
          if (!raw.trim()) continue;
          lines.push(`${formatSectionLabel(section) || section}\n${raw.trimEnd()}`);
        }
        return lines.join("\n\n");
      }

      async function openConstructPreviewDialog(text) {
        return new Promise((resolve) => {
          dom.constructPreviewText.textContent = text;
          dom.constructCopiedMessage.hidden = true;
          dom.btnConstructCopy.hidden = false;
          dom.btnConstructCancel.hidden = false;
          dom.btnConstructOk.hidden = true;

          let settled = false;
          const settle = (value) => {
            if (settled) return;
            settled = true;
            if (dom.constructDialog.open) {
              dom.constructDialog.close();
            }
            cleanup();
            resolve(value);
          };

          const onCancel = () => settle("cancel");
          const onOk = () => settle("ok");
          const onCopy = async () => {
            await copyText(
              text,
              "Copied constructed prompt to clipboard",
              dom.btnConstructCopy
            );
            dom.constructCopiedMessage.hidden = false;
            dom.btnConstructCopy.hidden = true;
            dom.btnConstructCancel.hidden = true;
            dom.btnConstructOk.hidden = false;
          };
          const onDialogCancel = (event) => {
            event.preventDefault();
            settle("cancel");
          };
          const onClose = () => settle("cancel");

          const cleanup = () => {
            dom.btnConstructCancel.removeEventListener("click", onCancel);
            dom.btnConstructOk.removeEventListener("click", onOk);
            dom.btnConstructCopy.removeEventListener("click", onCopy);
            dom.constructDialog.removeEventListener("cancel", onDialogCancel);
            dom.constructDialog.removeEventListener("close", onClose);
          };

          dom.btnConstructCancel.addEventListener("click", onCancel);
          dom.btnConstructOk.addEventListener("click", onOk);
          dom.btnConstructCopy.addEventListener("click", onCopy);
          dom.constructDialog.addEventListener("cancel", onDialogCancel);
          dom.constructDialog.addEventListener("close", onClose);
          dom.constructDialog.showModal();
        });
      }

      async function handleConstructAction(agentMeta, sectionOnly) {
        const detail = await loadAgentDetail(
          agentMeta.user,
          agentMeta.group || AGENT_GROUP_UNSORTED_ID,
          agentMeta.agent_slug
        );
        const allSections = Array.isArray(detail.sectionOrder) ? detail.sectionOrder : [];
        const activeSection = detail.activeSection || allSections[0] || "";
        const sectionNames = sectionOnly
          ? activeSection
            ? [activeSection]
            : []
          : allSections;
        if (!sectionNames.length) {
          setStatus("No section available to construct", true);
          return;
        }

        const isDirty = isAgentDetailDirty(detail, false);
        let useSavedValues = false;
        if (isDirty) {
          const choice = await askChoiceDialog({
            title: "You have unsaved changes.",
            message: "Choose how to continue.",
            primaryLabel: "Save and Construct",
            secondaryLabel: "Cancel",
            tertiaryLabel: "Construct Without Saving",
          });
          if (choice === "secondary") return;
          if (choice === "primary") {
            const savedOk = await saveDirtyAgentSections(agentMeta, detail);
            if (!savedOk) {
              setStatus("Agent section save failed: Server may not be running", true);
              return;
            }
            useSavedValues = true;
            render();
          }
        }

        const text = buildConstructedPrompt(detail, sectionNames, useSavedValues);
        await openConstructPreviewDialog(text);
      }

      function render() {
        dom.blocksContainer.innerHTML = "";
        ensureActiveGroupIsValid();
        ensureActiveAgentGroupIsValid();
        renderGroups();
        dom.btnAdd.hidden = state.activeMode !== "prompts";
        dom.btnAddGroup.hidden = state.activeMode !== "prompts";
        syncSearchInputFromState();
        updateCountLabel();
        if (state.activeMode === "agents") {
          const visibleAgents = getVisibleAgents();
          if (!visibleAgents.length) {
            const empty = document.createElement("div");
            empty.className = "empty-state";
            if (getActiveSearchTerm().trim()) {
              empty.textContent =
                `No agents match "${getActiveSearchTerm().trim()}" in ${getActiveAgentGroupLabel()}.`;
            } else if (getActiveAgentGroupId() === AGENT_GROUP_ALL_ID) {
              empty.textContent = `No agents yet for ${getActiveProfileLabel()}.`;
            } else {
              empty.textContent = `No agents yet in ${getActiveAgentGroupLabel()}.`;
            }
            dom.blocksContainer.appendChild(empty);
            return;
          }

          for (const agentMeta of visibleAgents) {
            dom.blocksContainer.appendChild(createAgentElement(agentMeta));
          }
          return;
        }
        const activeBlocks = getVisibleBlocks();

        if (!activeBlocks.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          if (getActiveSearchTerm().trim()) {
            empty.textContent =
              `No prompts match "${getActiveSearchTerm().trim()}" in ${getActiveGroupLabel()}.`;
          } else if (getActiveGroupId() === GROUP_ALL_ID) {
            empty.textContent =
              `No prompts yet for ${getActiveProfileLabel()}. Use + New Prompt to create one.`;
          } else {
            empty.textContent =
              `No prompts yet in ${getActiveGroupLabel()}. Use + New Prompt to create one.`;
          }
          dom.blocksContainer.appendChild(empty);
          return;
        }

        for (const block of activeBlocks) {
          dom.blocksContainer.appendChild(createBlockElement(block));
        }
      }

      function clearDropMarkers() {
        const marked = dom.blocksContainer.querySelectorAll(".drop-before, .drop-after");
        for (const node of marked) {
          node.classList.remove("drop-before", "drop-after");
        }
        const groupMarked = dom.groupsContainer.querySelectorAll(".drop-target");
        for (const node of groupMarked) {
          node.classList.remove("drop-target");
        }
      }

      function updateDropMarker(card, insertBefore) {
        clearDropMarkers();
        card.classList.add(insertBefore ? "drop-before" : "drop-after");
      }

      function isAgentDetailDirty(detail, sectionOnly = false) {
        if (!detail || !detail.dirtyBySection) return false;
        if (sectionOnly) {
          const section = detail.activeSection || "";
          return !!(section && detail.dirtyBySection[section]);
        }
        return Object.values(detail.dirtyBySection).some(Boolean);
      }

      function discardAgentDetailDraft(detail, sectionOnly = false) {
        if (!detail || !detail.draftBySection || !detail.savedBySection) return;
        if (sectionOnly) {
          const section = detail.activeSection || "";
          if (!section) return;
          detail.draftBySection[section] = detail.savedBySection[section] || "";
          detail.dirtyBySection[section] = false;
          return;
        }
        for (const section of Object.keys(detail.draftBySection)) {
          detail.draftBySection[section] = detail.savedBySection[section] || "";
          detail.dirtyBySection[section] = false;
        }
      }

      async function confirmDiscardAgentChangesIfNeeded({ detail = null, sectionOnly = false } = {}) {
        let targetDetail = detail;
        if (!targetDetail) {
          const expandedKeys = state.expandedAgentKeyByProfile[state.activeProfile] || [];
          for (const expandedKey of expandedKeys) {
            const candidate = state.agentDetailsByKey[expandedKey] || null;
            if (candidate && isAgentDetailDirty(candidate, sectionOnly)) {
              targetDetail = candidate;
              break;
            }
          }
        }
        if (!targetDetail) return true;
        if (!isAgentDetailDirty(targetDetail, sectionOnly)) return true;

        const choice = await askChoiceDialog({
          title: "Discard changes?",
          message: "You have unsaved changes.",
          primaryLabel: "Discard Changes",
          secondaryLabel: "Keep Editing",
        });
        if (choice !== "primary") return false;
        discardAgentDetailDraft(targetDetail, sectionOnly);
        return true;
      }

      async function persistWithStatus(successMessage, errorMessage = "Autosave failed: Server may not be running") {
        try {
          await saveToServer();
          setStatus(successMessage);
        } catch (_err) {
          setStatus(errorMessage, true);
        }
      }

      function moveBlock(draggedId, targetId, insertBefore) {
        if (draggedId === targetId) return;
        const activeBlocks = getActiveBlocks();

        const dragIndex = activeBlocks.findIndex((b) => b.id === draggedId);
        const targetIndex = activeBlocks.findIndex((b) => b.id === targetId);
        if (dragIndex < 0 || targetIndex < 0) return;

        const previousBlocks = cloneBlocks(activeBlocks);
        const [draggedBlock] = activeBlocks.splice(dragIndex, 1);
        const liveTargetIndex = activeBlocks.findIndex((b) => b.id === targetId);
        const insertIndex = insertBefore ? liveTargetIndex : liveTargetIndex + 1;
        activeBlocks.splice(insertIndex, 0, draggedBlock);
        setActiveBlocks(activeBlocks);

        setUndoSnapshot(previousBlocks, "Previous order restored");
        render();
        void persistWithStatus(
          `Changed order of "${truncateStatusName(draggedBlock.name)}"`
        );
      }

      function moveAgent(draggedKey, targetKey, insertBefore) {
        if (draggedKey === targetKey) return;
        const agents = getActiveAgents();
        const dragIndex = agents.findIndex(
          (agent) =>
            getAgentKey(
              agent.user,
              agent.group || AGENT_GROUP_UNSORTED_ID,
              agent.agent_slug
            ) === draggedKey
        );
        const targetIndex = agents.findIndex(
          (agent) =>
            getAgentKey(
              agent.user,
              agent.group || AGENT_GROUP_UNSORTED_ID,
              agent.agent_slug
            ) === targetKey
        );
        if (dragIndex < 0 || targetIndex < 0) return;

        const [draggedAgent] = agents.splice(dragIndex, 1);
        const liveTargetIndex = agents.findIndex(
          (agent) =>
            getAgentKey(
              agent.user,
              agent.group || AGENT_GROUP_UNSORTED_ID,
              agent.agent_slug
            ) === targetKey
        );
        const insertIndex = insertBefore ? liveTargetIndex : liveTargetIndex + 1;
        agents.splice(insertIndex, 0, draggedAgent);
        state.agentsByProfile[state.activeProfile] = agents;
        render();
        setStatus(`Changed order of agent "${truncateStatusName(draggedAgent.title)}"`);
      }

      function moveBlockToGroup(draggedId, targetGroupId) {
        const activeBlocks = getActiveBlocks();
        const dragIndex = activeBlocks.findIndex((block) => block.id === draggedId);
        if (dragIndex < 0) return;
        const draggedBlock = activeBlocks[dragIndex];
        if (!draggedBlock) return;
        if (draggedBlock.groupId === targetGroupId) {
          setStatus(`"${truncateStatusName(draggedBlock.name)}" is already in ${getGroupLabel(targetGroupId)}`);
          return;
        }

        const previousBlocks = cloneBlocks(activeBlocks);
        const [moved] = activeBlocks.splice(dragIndex, 1);
        moved.groupId = targetGroupId;
        moved.updatedAt = nowIso();
        activeBlocks.push(moved);
        setActiveBlocks(activeBlocks);

        setUndoSnapshot(
          previousBlocks,
          `Restored "${truncateStatusName(moved.name)}" to ${getGroupLabel(previousBlocks[dragIndex].groupId || DEFAULT_GROUP_ID)}`
        );
        render();
        void persistWithStatus(
          `Moved "${truncateStatusName(moved.name)}" to ${getGroupLabel(targetGroupId)}`
        );
      }

      async function copyText(text, successMsg, anchorEl = null) {
        try {
          await navigator.clipboard.writeText(text);
          showToast(successMsg, false, 1400, anchorEl);
        } catch (_err) {
          const ok = fallbackCopyText(text);
          if (ok) showToast(successMsg, false, 1400, anchorEl);
          else showToast("Clipboard failed. Copy manually from expanded panel.", true, 1600, anchorEl);
        }
      }

      function showToast(message, isError = false, durationMs = 1400, anchorEl = null) {
        const toast = document.createElement("div");
        toast.className = `toast${isError ? " error" : ""}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        positionToast(toast, anchorEl);
        requestAnimationFrame(() => toast.classList.add("show"));
        window.setTimeout(() => {
          toast.classList.remove("show");
          window.setTimeout(() => toast.remove(), 220);
        }, durationMs);
      }

      function positionToast(toastEl, anchorEl) {
        const margin = 12;
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const toastRect = toastEl.getBoundingClientRect();

        let left = viewportWidth - toastRect.width - 16;
        let top = viewportHeight - toastRect.height - 16;

        if (anchorEl && typeof anchorEl.getBoundingClientRect === "function") {
          const anchorRect = anchorEl.getBoundingClientRect();
          left = anchorRect.right - toastRect.width - 6;
          top = anchorRect.bottom - toastRect.height - 6;
        }

        left = Math.min(Math.max(margin, left), viewportWidth - toastRect.width - margin);
        top = Math.min(Math.max(margin, top), viewportHeight - toastRect.height - margin);

        toastEl.style.left = `${left}px`;
        toastEl.style.top = `${top}px`;
      }

      function fallbackCopyText(text) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "true");
        ta.style.position = "absolute";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();

        let ok = false;
        try {
          ok = document.execCommand("copy");
        } catch (_err) {
          ok = false;
        }

        ta.remove();
        return ok;
      }

      function openNewDialog() {
        state.editingId = null;
        dom.dialogTitle.textContent = "New Prompt";
        dom.contextForm.reset();
        populateGroupSelect();
        dom.contextDialog.showModal();
        dom.nameInput.focus();
      }

      function openEditDialog(blockId) {
        const block = getActiveBlocks().find((b) => b.id === blockId);
        if (!block) return;

        state.editingId = block.id;
        dom.dialogTitle.textContent = "Edit Prompt";
        dom.nameInput.value = block.name;
        dom.descriptionInput.value = block.description;
        dom.contextInput.value = block.contextText;
        populateGroupSelect(block.groupId);
        dom.contextDialog.showModal();
        dom.nameInput.focus();
      }

      function closeDialog() {
        if (dom.contextDialog.open) dom.contextDialog.close();
      }

      function askChoiceDialog({
        title = "Confirm",
        message = "",
        primaryLabel = "OK",
        secondaryLabel = "Cancel",
        tertiaryLabel = "",
      }) {
        return new Promise((resolve) => {
          dom.choiceTitle.textContent = title;
          dom.choiceMessage.textContent = message;
          dom.choiceBtnPrimary.textContent = primaryLabel;
          dom.choiceBtnSecondary.textContent = secondaryLabel;
          dom.choiceBtnTertiary.textContent = tertiaryLabel || "";
          dom.choiceBtnTertiary.hidden = !tertiaryLabel;

          let settled = false;
          const settle = (value) => {
            if (settled) return;
            settled = true;
            if (dom.choiceDialog.open) {
              dom.choiceDialog.close();
            }
            cleanup();
            resolve(value);
          };

          const onPrimary = () => settle("primary");
          const onSecondary = () => settle("secondary");
          const onTertiary = () => settle("tertiary");
          const onCancel = (event) => {
            event.preventDefault();
            settle("secondary");
          };
          const onClose = () => {
            settle("secondary");
          };

          const cleanup = () => {
            dom.choiceBtnPrimary.removeEventListener("click", onPrimary);
            dom.choiceBtnSecondary.removeEventListener("click", onSecondary);
            dom.choiceBtnTertiary.removeEventListener("click", onTertiary);
            dom.choiceDialog.removeEventListener("cancel", onCancel);
            dom.choiceDialog.removeEventListener("close", onClose);
          };

          dom.choiceBtnPrimary.addEventListener("click", onPrimary);
          dom.choiceBtnSecondary.addEventListener("click", onSecondary);
          dom.choiceBtnTertiary.addEventListener("click", onTertiary);
          dom.choiceDialog.addEventListener("cancel", onCancel);
          dom.choiceDialog.addEventListener("close", onClose);
          dom.choiceDialog.showModal();
        });
      }

      function upsertFromDialog() {
        const name = dom.nameInput.value.trim();
        const description = dom.descriptionInput.value.trim();
        const contextText = dom.contextInput.value;
        const selectedGroupId = dom.groupSelect.value || DEFAULT_GROUP_ID;

        if (!name || !description || !contextText.trim()) {
          setStatus("Name, description, and prompt text are required", true);
          return;
        }

        const activeBlocks = getActiveBlocks();
        const previousBlocks = cloneBlocks(activeBlocks);

        if (state.editingId) {
          const idx = activeBlocks.findIndex((b) => b.id === state.editingId);
          if (idx < 0) return;

          const restoredName =
            previousBlocks[idx] && typeof previousBlocks[idx].name === "string"
              ? previousBlocks[idx].name
              : name;

          activeBlocks[idx] = {
            ...activeBlocks[idx],
            name,
            description,
            contextText,
            groupId: selectedGroupId,
            updatedAt: nowIso(),
          };

          setUndoSnapshot(
            previousBlocks,
            `Restored "${truncateStatusName(restoredName)}"`
          );
          setActiveBlocks(activeBlocks);
          render();
          closeDialog();
          void persistWithStatus(`Changed "${truncateStatusName(name)}"`);
        } else {
          const newBlock = {
            id: generateId(),
            name,
            description,
            contextText,
            groupId: selectedGroupId,
            createdAt: nowIso(),
            updatedAt: nowIso(),
            order: activeBlocks.length,
          };

          activeBlocks.push(newBlock);
          setActiveBlocks(activeBlocks);
          setUndoSnapshot(previousBlocks, "Prompt removed");
          render();
          closeDialog();
          void persistWithStatus(`Added "${truncateStatusName(name)}"`);
        }
      }

      function deleteBlock(id) {
        const activeBlocks = getActiveBlocks();
        const block = activeBlocks.find((b) => b.id === id);
        if (!block) return;

        const ok = window.confirm(`Delete "${block.name}"?`);
        if (!ok) return;

        const previousBlocks = cloneBlocks(activeBlocks);
        setActiveBlocks(activeBlocks.filter((b) => b.id !== id));

        setUndoSnapshot(
          previousBlocks,
          `Restored "${truncateStatusName(block.name)}"`
        );
        render();
        void persistWithStatus(`Deleted "${truncateStatusName(block.name)}"`);
      }

      async function undoLastAction() {
        if (!state.undoSnapshot) {
          setStatus("Nothing to undo");
          return;
        }

        setActiveBlocks(cloneBlocks(state.undoSnapshot));
        const undoResultMessage = state.undoStatusMessage || "Undid last action";

        clearUndoSnapshot();
        render();

        try {
          await saveToServer();
          setStatus(undoResultMessage);
        } catch (_err) {
          setStatus("Autosave failed: Server may not be running", true);
        }
      }

      function populateGroupSelect(selectedGroupId = "") {
        dom.groupSelect.innerHTML = "";
        const groups = getActiveGroups();
        let targetId =
          selectedGroupId ||
          (getActiveGroupId() === GROUP_ALL_ID ? DEFAULT_GROUP_ID : getActiveGroupId());
        const validIds = new Set(groups.map((group) => group.id));
        if (!validIds.has(targetId)) {
          targetId = DEFAULT_GROUP_ID;
        }

        for (const group of groups) {
          const option = document.createElement("option");
          option.value = group.id;
          option.textContent = group.name;
          dom.groupSelect.appendChild(option);
        }
        dom.groupSelect.value = targetId;
      }

      function addGroup() {
        const rawName = window.prompt("New group name:");
        if (rawName === null) return;
        const name = rawName.trim();
        if (!name) {
          setStatus("Group name is required", true);
          return;
        }

        const groups = getActiveGroups();
        const existing = groups.find(
          (group) => group.name.toLowerCase() === name.toLowerCase()
        );
        if (existing) {
          setActiveGroupId(existing.id);
          saveActiveGroupsLocal();
          render();
          setStatus(`Using existing group "${truncateStatusName(existing.name)}"`);
          return;
        }

        const nextGroups = [
          ...groups,
          {
            id: generateId("grp"),
            name,
            createdAt: nowIso(),
            order: groups.length,
          },
        ];
        setActiveGroups(nextGroups);
        setActiveGroupId(nextGroups[nextGroups.length - 1].id);
        saveActiveGroupsLocal();
        render();
        void persistWithStatus(`Added group "${truncateStatusName(name)}"`);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function bindEvents() {
        dom.btnAdd.addEventListener("click", openNewDialog);
        dom.btnAddGroup.addEventListener("click", addGroup);
        dom.userSelect.addEventListener("change", () => {
          switchProfile(dom.userSelect.value);
        });
        dom.searchInput.addEventListener("input", () => {
          if (state.activeMode === "agents") {
            state.agentSearchByProfile[state.activeProfile] = dom.searchInput.value;
          } else {
            state.searchByProfile[state.activeProfile] = dom.searchInput.value;
          }
          render();
        });
        dom.btnCancelDialog.addEventListener("click", closeDialog);
        dom.contextForm.addEventListener("submit", (event) => {
          event.preventDefault();
          upsertFromDialog();
        });
        dom.btnUndoStatus.addEventListener("click", () => {
          void undoLastAction();
        });
      }

      async function init() {
        bindEvents();
        try {
          await loadAppConfig();
        } catch (_err) {
          state.configuredUsers = [{ id: "default", label: "Default" }];
          setStatus("Could not load app config; using default user", true);
        }
        for (const user of state.configuredUsers) {
          initProfileState(user.id);
        }
        if (!state.configuredUsers.some((user) => user.id === state.activeProfile)) {
          state.activeProfile = state.configuredUsers[0].id;
        }
        loadActiveProfileLocal();
        loadActiveGroupsLocal();
        loadActiveAgentGroupsLocal();
        if (!state.configuredUsers.some((user) => user.id === state.activeProfile)) {
          state.activeProfile = state.configuredUsers[0].id;
        }
        renderUserSelect();
        try {
          await loadFromServer();
        } catch (_err) {
          for (const user of state.configuredUsers) {
            state.profiles[user.id] = [];
            state.groups[user.id] = ensureDefaultGroup([]);
          }
          setStatus("Could not load from server", true);
        }
        for (const user of state.configuredUsers) {
          try {
            await loadAgentsForProfile(user.id);
          } catch (_err) {
            state.agentsByProfile[user.id] = [];
          }
        }
        ensureActiveGroupIsValid();
        ensureActiveAgentGroupIsValid();
        syncSearchInputFromState();
        render();
        if (!dom.statusText.textContent) {
          setStatus("");
        }
      }

      void init();
    })();
  </script>
</body>
</html>
