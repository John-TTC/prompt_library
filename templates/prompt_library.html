<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --danger: #ef4444;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 2;
      width: min(1052px, calc(100% - 20px));
      margin: 0 auto;
    }

    .header-spacer { grid-column: 1; }

    .header-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      text-align: center;
      grid-column: 2;
      justify-self: center;
    }

    .header-title {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
    }

    .header-subtitle {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    .header-actions {
      grid-column: 3;
      justify-self: end;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }

    .user-select-label {
      font-size: 11px;
      color: var(--muted);
    }

    .user-select {
      min-width: 150px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.16s ease-in-out;
      font-size: 13px;
    }

    button:hover {
      border-color: var(--accent);
      background: #283548;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #1d4ed8;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1e40af;
      border-color: #3b82f6;
    }

    .status {
      padding: 8px 18px;
      border-bottom: 1px solid rgba(55, 65, 81, 0.6);
      min-height: 30px;
      width: min(1052px, calc(100% - 20px));
      margin: 0 auto;
    }

    .status-description {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
      text-align: center;
    }

    .list-status {
      font-size: 12px;
      color: #93c5fd;
      min-height: 22px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(107, 114, 128, 0.55);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
    }

    .status-text {
      min-height: 16px;
      line-height: 1.3;
    }

    .status-undo {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 6px;
    }

    .toast {
      position: fixed;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #475569;
      color: #e2e8f0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      max-width: min(420px, 80vw);
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.35);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-color: #b91c1c;
      color: #fecaca;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px minmax(320px, 820px);
      gap: 12px;
      justify-content: center;
      padding: 16px;
      min-height: calc(100vh - 105px);
    }

    .groups-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.88);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 150px);
      min-height: 300px;
    }

    .groups-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      gap: 8px;
    }

    .groups-panel-header button {
      padding: 5px 8px;
      font-size: 11px;
    }

    .groups-scroll {
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .group-item {
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      padding: 8px 10px;
    }

    .group-item.active {
      background: #1e3a8a;
      border-color: #3b82f6;
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.35);
    }

    .group-item.drop-target {
      border-color: #93c5fd;
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.7);
      background: #243244;
    }

    .nav-section-title {
      margin: 8px 4px 2px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .group-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-count {
      color: var(--muted);
      font-size: 11px;
      flex-shrink: 0;
    }

    .agent-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .agent-tab-btn {
      padding: 5px 9px;
      font-size: 11px;
      border-radius: 7px;
    }

    .agent-tab-btn.active {
      background: #1e3a8a;
      border-color: #3b82f6;
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, 0.35);
    }

    .agent-section-meta {
      font-size: 12px;
      color: #9ca3af;
    }

    .agent-editor {
      min-height: 170px;
      background: #030712;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #d1d5db;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
      resize: vertical;
    }

    .agent-editor.is-dirty {
      border-color: #60a5fa;
      background: rgba(30, 58, 138, 0.12);
    }

    .agent-action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .agent-action-bar button {
      font-size: 12px;
      padding: 6px 10px;
    }

    .list-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.88);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 150px);
      min-height: 300px;
    }

    .list-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .list-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-controls input {
      width: 230px;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 6px;
    }

    .blocks-scroll {
      overflow: auto;
      padding: 8px 10px 14px;
      flex: 1;
    }

    .block-card {
      border: 1px solid #6b7280;
      border-radius: 10px;
      margin-top: 10px;
      background: #374151;
      overflow: hidden;
      cursor: grab;
      transition: box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .block-card.dragging {
      opacity: 0.55;
      cursor: grabbing;
      box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.7);
    }

    .block-card.drop-before {
      box-shadow: inset 0 3px 0 #93c5fd;
    }

    .block-card.drop-after {
      box-shadow: inset 0 -3px 0 #93c5fd;
    }

    .block-card:first-child {
      margin-top: 0;
    }

    .block-header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 10px 12px 8px;
      align-items: start;
    }

    .block-title-wrap {
      min-width: 0;
    }

    .block-title {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      word-break: break-word;
    }

    .block-description {
      margin: 6px 0 0;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.35;
      max-width: 680px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .block-meta {
      margin-top: 7px;
    }

    .group-badge {
      display: inline-block;
      font-size: 11px;
      border: 1px solid #475569;
      border-radius: 999px;
      padding: 2px 7px;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.45);
    }

    .row-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-self: end;
      align-self: start;
      flex-wrap: nowrap;
    }

    .row-actions button {
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-danger:hover {
      border-color: #f87171;
      color: #fecaca;
    }

    .arrow-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      line-height: 1;
      border-radius: 8px;
      user-select: none;
    }

    .arrow-btn[aria-expanded="true"] {
      background: #1e3a8a;
      border-color: #3b82f6;
    }

    .context-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.2s ease;
      border-top: 1px solid transparent;
    }

    .context-body.open {
      max-height: 340px;
      border-top-color: var(--border);
    }

    .context-body-inner {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .context-collapse-hitarea {
      height: 4px;
      width: 100%;
    }

    .context-text {
      background: #030712;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #d1d5db;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 220px;
      font-size: 12px;
      line-height: 1.4;
    }

    .prompt-inline-editor {
      min-height: 190px;
      background: #030712;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #d1d5db;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
      resize: vertical;
    }

    .prompt-action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .prompt-action-bar button {
      font-size: 12px;
      padding: 6px 10px;
    }

    .prompt-inline-editor.is-dirty {
      border-color: #60a5fa;
      background: rgba(30, 58, 138, 0.12);
    }

    .empty-state {
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 18px;
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
    }

    dialog {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0f172a;
      color: var(--text);
      width: min(760px, 92vw);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(2, 6, 23, 0.6);
      backdrop-filter: blur(2px);
    }

    .dialog-content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dialog-title {
      margin: 0;
      font-size: 18px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111827;
      color: var(--text);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }

    textarea.context-input {
      min-height: 180px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 760px) {
      .app-header { grid-template-columns: 1fr; }
      .header-spacer { display: none; }
      .header-title-wrap { grid-column: 1; }
      .header-actions {
        grid-column: 1;
        justify-self: center;
      }
      .layout { grid-template-columns: 1fr; }
      .groups-panel { max-height: 210px; min-height: 140px; }
      .list-controls input { width: 100%; }
      .list-panel-header { flex-direction: column; align-items: stretch; gap: 8px; }
      .list-panel { max-height: unset; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-spacer" aria-hidden="true"></div>
    <div class="header-title-wrap">
      <h1 class="header-title">Prompt Library</h1>
      <p class="header-subtitle">Manages your favorite LLM session directives</p>
    </div>
    <div class="header-actions">
      <label class="user-select-label" for="userSelect">Active user</label>
      <select id="userSelect" class="user-select"></select>
    </div>
  </header>

  <div class="status">
    <div class="status-description">
      Allows you to save and retrieve reusable prompt blocks for quick paste into LLM sessions in order to establish a consistent session setup
    </div>
  </div>

  <main class="layout">
    <aside class="groups-panel">
      <div class="groups-panel-header">
        <span>Groups</span>
        <button id="btnAddGroup" type="button">+ Group</button>
      </div>
      <div id="groupsContainer" class="groups-scroll"></div>
    </aside>
    <section class="list-panel">
      <div class="list-panel-header">
        <span id="countLabel">0 prompts</span>
        <div class="list-controls">
          <input id="searchInput" type="search" placeholder="Search prompts..." />
          <button id="btnAdd" class="btn-primary">+ New Prompt</button>
        </div>
      </div>
      <div id="statusMessage" class="list-status">
        <span id="statusText" class="status-text"></span>
        <button id="btnUndoStatus" class="status-undo" type="button" hidden>Undo</button>
      </div>
      <div id="blocksContainer" class="blocks-scroll"></div>
    </section>
  </main>

  <dialog id="contextDialog">
    <form id="contextForm" method="dialog" class="dialog-content">
      <h2 id="dialogTitle" class="dialog-title">New Prompt</h2>

      <label>
        Name
        <input id="nameInput" name="name" maxlength="120" required />
      </label>

      <label>
        Description
        <textarea id="descriptionInput" name="description" rows="4" maxlength="800" required></textarea>
      </label>

      <label>
        Group
        <select id="groupSelect" name="group"></select>
      </label>

      <label>
        Full Prompt
        <textarea id="contextInput" class="context-input" name="context" required></textarea>
      </label>

      <div class="dialog-actions">
        <button type="button" id="btnCancelDialog">Cancel</button>
        <button type="submit" class="btn-primary" id="btnSaveDialog">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="choiceDialog">
    <form id="choiceForm" method="dialog" class="dialog-content">
      <h2 id="choiceTitle" class="dialog-title">Confirm</h2>
      <p id="choiceMessage" style="margin: 0; color: #cbd5e1; font-size: 14px;"></p>
      <div class="dialog-actions">
        <button type="button" id="choiceBtnSecondary"></button>
        <button type="button" id="choiceBtnPrimary" class="btn-primary"></button>
        <button type="button" id="choiceBtnTertiary"></button>
      </div>
    </form>
  </dialog>

  <dialog id="constructDialog">
    <form method="dialog" class="dialog-content">
      <h2 class="dialog-title">Constructed Prompt</h2>
      <pre id="constructPreviewText" class="context-text"></pre>
      <p id="constructCopiedMessage" class="agent-section-meta" hidden>Copied to Clipboard</p>
      <div class="dialog-actions">
        <button type="button" id="btnConstructCancel">Cancel</button>
        <button type="button" id="btnConstructCopy" class="btn-primary">Copy to Clipboard</button>
        <button type="button" id="btnConstructOk" class="btn-primary" hidden>OK</button>
      </div>
    </form>
  </dialog>

  <script>
    (() => {
      "use strict";

      const dom = {
        statusText: document.getElementById("statusText"),
        btnUndoStatus: document.getElementById("btnUndoStatus"),
        countLabel: document.getElementById("countLabel"),
        blocksContainer: document.getElementById("blocksContainer"),
        groupsContainer: document.getElementById("groupsContainer"),
        searchInput: document.getElementById("searchInput"),
        btnAddGroup: document.getElementById("btnAddGroup"),
        btnAdd: document.getElementById("btnAdd"),
        contextDialog: document.getElementById("contextDialog"),
        contextForm: document.getElementById("contextForm"),
        dialogTitle: document.getElementById("dialogTitle"),
        nameInput: document.getElementById("nameInput"),
        descriptionInput: document.getElementById("descriptionInput"),
        contextInput: document.getElementById("contextInput"),
        groupSelect: document.getElementById("groupSelect"),
        btnCancelDialog: document.getElementById("btnCancelDialog"),
        userSelect: document.getElementById("userSelect"),
        choiceDialog: document.getElementById("choiceDialog"),
        choiceTitle: document.getElementById("choiceTitle"),
        choiceMessage: document.getElementById("choiceMessage"),
        choiceBtnPrimary: document.getElementById("choiceBtnPrimary"),
        choiceBtnSecondary: document.getElementById("choiceBtnSecondary"),
        choiceBtnTertiary: document.getElementById("choiceBtnTertiary"),
        constructDialog: document.getElementById("constructDialog"),
        constructPreviewText: document.getElementById("constructPreviewText"),
        constructCopiedMessage: document.getElementById("constructCopiedMessage"),
        btnConstructCancel: document.getElementById("btnConstructCancel"),
        btnConstructCopy: document.getElementById("btnConstructCopy"),
        btnConstructOk: document.getElementById("btnConstructOk"),
      };

      const GROUP_ALL_ID = "__all__";
      const DEFAULT_GROUP_ID = "group-unsorted";
      const AGENT_GROUP_ALL_ID = "__all_agents__";
      const AGENT_GROUP_UNSORTED_ID = "agent-group-unsorted";
      const PROFILE_STORAGE_KEY = "promptLibrary.activeProfile";
      const GROUP_STORAGE_KEY = "promptLibrary.activeGroups";
      const AGENT_GROUP_STORAGE_KEY = "promptLibrary.activeAgentGroups";

      const state = {
        configuredUsers: [{ id: "default", label: "Default" }],
        profiles: {},
        groups: {},
        agentsByProfile: {},
        agentDetailsByKey: {},
        activeProfile: "default",
        activeMode: "prompts",
        activeGroupByProfile: {},
        activeAgentGroupByProfile: {},
        expandedAgentKeyByProfile: {},
        searchByProfile: {},
        agentSearchByProfile: {},
        promptUiByProfile: {},
        editingId: null,
        undoSnapshot: null,
        undoStatusMessage: "",
      };

      const dragState = {
        draggedId: null,
      };

      function initProfileState(profileId) {
        if (!state.profiles[profileId]) state.profiles[profileId] = [];
        if (!state.groups[profileId]) {
          state.groups[profileId] = ensureDefaultGroup([]);
        } else {
          state.groups[profileId] = ensureDefaultGroup(state.groups[profileId]);
        }
        if (!state.agentsByProfile[profileId]) state.agentsByProfile[profileId] = [];
        if (!state.activeGroupByProfile[profileId]) {
          state.activeGroupByProfile[profileId] = GROUP_ALL_ID;
        }
        if (!state.activeAgentGroupByProfile[profileId]) {
          state.activeAgentGroupByProfile[profileId] = AGENT_GROUP_ALL_ID;
        }
        if (!Array.isArray(state.expandedAgentKeyByProfile[profileId])) {
          state.expandedAgentKeyByProfile[profileId] = [];
        }
        if (typeof state.searchByProfile[profileId] !== "string") {
          state.searchByProfile[profileId] = "";
        }
        if (typeof state.agentSearchByProfile[profileId] !== "string") {
          state.agentSearchByProfile[profileId] = "";
        }
        if (!state.promptUiByProfile[profileId] || typeof state.promptUiByProfile[profileId] !== "object") {
          state.promptUiByProfile[profileId] = {};
        }
      }

      function getActiveUserDef() {
        return (
          state.configuredUsers.find((user) => user.id === state.activeProfile) ||
          state.configuredUsers[0] ||
          { id: "default", label: "Default" }
        );
      }

      async function loadAppConfig() {
        const response = await fetch("/app-config", { cache: "no-store" });
        if (!response.ok) throw new Error("Config load failed");
        const parsed = await response.json();
        const usersRaw =
          parsed && Array.isArray(parsed.users) ? parsed.users : [];
        const cleaned = [];
        for (const entry of usersRaw) {
          if (!entry || typeof entry !== "object") continue;
          const id = typeof entry.id === "string" ? entry.id.trim() : "";
          const label =
            typeof entry.label === "string" ? entry.label.trim() : "";
          if (!id || !label) continue;
          cleaned.push({ id, label });
        }
        state.configuredUsers =
          cleaned.length > 0 ? cleaned : [{ id: "default", label: "Default" }];
      }

      async function loadFromServer() {
        const response = await fetch("/data", { cache: "no-store" });
        if (!response.ok) throw new Error("Load failed");
        const parsed = await response.json();
        const hasUsersObject =
          parsed &&
          typeof parsed === "object" &&
          parsed.users &&
          typeof parsed.users === "object";

        const fallbackUserEntries = hasUsersObject
          ? Object.entries(parsed.users).filter(
              ([, value]) => value && typeof value === "object"
            )
          : [];
        const usedFallbackKeys = new Set();

        for (const user of state.configuredUsers) {
          initProfileState(user.id);
          let userRaw = [];
          if (hasUsersObject) {
            userRaw = parsed.users[user.id];
            if (!userRaw && user.id === "john" && parsed.users.john) {
              userRaw = parsed.users.john;
              usedFallbackKeys.add("john");
            }
            if (!userRaw && user.id === "kathy" && parsed.users.kathy) {
              userRaw = parsed.users.kathy;
              usedFallbackKeys.add("kathy");
            }
            if (!userRaw) {
              const fallback = fallbackUserEntries.find(
                ([key]) => !usedFallbackKeys.has(key)
              );
              if (fallback) {
                userRaw = fallback[1];
                usedFallbackKeys.add(fallback[0]);
              }
            }
          } else if (parsed && typeof parsed === "object") {
            userRaw =
              user.id === state.configuredUsers[0].id ? parsed.blocks : [];
          }
          const userData = normalizeUserData(userRaw);
          state.groups[user.id] = userData.groups;
          state.profiles[user.id] = userData.blocks;
        }
      }

      function normalizeAgentMeta(entry) {
        if (!entry || typeof entry !== "object") return null;
        const user = typeof entry.user === "string" ? entry.user.trim() : "";
        const groupRaw = typeof entry.group === "string" ? entry.group.trim() : "";
        const group = groupRaw || AGENT_GROUP_UNSORTED_ID;
        const agentSlug =
          typeof entry.agent_slug === "string" ? entry.agent_slug.trim() : "";
        const title = typeof entry.title === "string" ? entry.title.trim() : "";
        if (!user || !agentSlug || !title) return null;
        const description =
          typeof entry.description === "string" ? entry.description : "";
        const sectionOrder = Array.isArray(entry.section_order)
          ? entry.section_order.filter((s) => typeof s === "string" && s.trim())
          : [];
        return {
          id: typeof entry.id === "string" && entry.id.trim() ? entry.id : agentSlug,
          title,
          description,
          user,
          group,
          agent_slug: agentSlug,
          section_order: sectionOrder,
        };
      }

      function normalizeSectionKey(value) {
        const raw = String(value || "").trim().toLowerCase();
        if (!raw) return "";
        return raw.replace(/\.md$/, "").replace(/-md$/, "").replace(/_md$/, "");
      }

      function formatSectionLabel(sectionKey) {
        const normalized = normalizeSectionKey(sectionKey);
        if (!normalized) return "";
        return normalized
          .split(/[-_]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function getAgentKey(user, group, agentSlug) {
        return `${user}|${group}|${agentSlug}`;
      }

      async function loadAgentsForProfile(profileId) {
        const response = await fetch(
          `/agents?user=${encodeURIComponent(profileId)}`,
          { cache: "no-store" }
        );
        if (!response.ok) throw new Error("Agent list load failed");
        const parsed = await response.json();
        const listRaw = parsed && Array.isArray(parsed.agents) ? parsed.agents : [];
        const normalized = [];
        for (const entry of listRaw) {
          const item = normalizeAgentMeta(entry);
          if (item) normalized.push(item);
        }
        state.agentsByProfile[profileId] = normalized;
      }

      async function loadAgentDetail(user, group, agentSlug) {
        const key = getAgentKey(user, group, agentSlug);
        const existing = state.agentDetailsByKey[key];
        if (existing) return existing;

        const query = new URLSearchParams({
          user,
          group,
          agent: agentSlug,
        });
        const response = await fetch(`/agents/load?${query.toString()}`, {
          cache: "no-store",
        });
        if (!response.ok) throw new Error("Agent load failed");
        const parsed = await response.json();
        const sectionOrderRaw = Array.isArray(parsed.section_order)
          ? parsed.section_order
          : [];
        const sectionMapRaw =
          parsed && parsed.sections && typeof parsed.sections === "object"
            ? parsed.sections
            : {};
        const sectionMap = {};
        for (const [key, value] of Object.entries(sectionMapRaw)) {
          const normalizedKey = normalizeSectionKey(key);
          if (!normalizedKey) continue;
          if (typeof sectionMap[normalizedKey] === "undefined") {
            sectionMap[normalizedKey] = typeof value === "string" ? value : "";
          }
        }
        const sectionOrder = [];
        const seen = new Set();
        for (const name of sectionOrderRaw) {
          if (typeof name !== "string" || !name.trim()) continue;
          const normalized = normalizeSectionKey(name);
          if (!normalized || seen.has(normalized)) continue;
          seen.add(normalized);
          sectionOrder.push(normalized);
        }
        if (!sectionOrder.length) {
          for (const key of Object.keys(sectionMap)) {
            if (!seen.has(key)) {
              seen.add(key);
              sectionOrder.push(key);
            }
          }
        }
        const savedBySection = {};
        const draftBySection = {};
        const dirtyBySection = {};
        for (const section of sectionOrder) {
          const text = typeof sectionMap[section] === "string" ? sectionMap[section] : "";
          savedBySection[section] = text;
          draftBySection[section] = text;
          dirtyBySection[section] = false;
        }

        const detail = {
          activeSection: sectionOrder[0] || "",
          sectionOrder,
          savedBySection,
          draftBySection,
          dirtyBySection,
        };
        state.agentDetailsByKey[key] = detail;
        return detail;
      }

      async function saveToServer() {
        const response = await fetch("/data", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(getPayload()),
        });
        if (!response.ok) throw new Error("Save failed");
      }

      function cloneBlocks(blocks) {
        return blocks.map((block) => ({ ...block }));
      }

      function withReindexedOrder(items) {
        return items.map((item, idx) => ({
          ...item,
          order: idx,
        }));
      }

      function getActiveBlocks() {
        return state.profiles[state.activeProfile] || [];
      }

      function setActiveBlocks(blocks) {
        state.profiles[state.activeProfile] = blocks;
      }

      function getActiveGroups() {
        return state.groups[state.activeProfile] || [];
      }

      function setActiveGroups(groups) {
        state.groups[state.activeProfile] = groups;
      }

      function getActiveGroupId() {
        return state.activeGroupByProfile[state.activeProfile] || GROUP_ALL_ID;
      }

      function setActiveGroupId(groupId) {
        state.activeGroupByProfile[state.activeProfile] = groupId;
      }

      function getActiveAgentGroupId() {
        return (
          state.activeAgentGroupByProfile[state.activeProfile] || AGENT_GROUP_ALL_ID
        );
      }

      function setActiveAgentGroupId(groupId) {
        state.activeAgentGroupByProfile[state.activeProfile] = groupId;
      }

      function getActiveAgents() {
        return state.agentsByProfile[state.activeProfile] || [];
      }

      function getActiveModeSearchTerm() {
        if (state.activeMode === "agents") {
          return state.agentSearchByProfile[state.activeProfile] || "";
        }
        return state.searchByProfile[state.activeProfile] || "";
      }

      function getPromptUiMap() {
        if (!state.promptUiByProfile[state.activeProfile]) {
          state.promptUiByProfile[state.activeProfile] = {};
        }
        return state.promptUiByProfile[state.activeProfile];
      }

      function getActiveProfileLabel() {
        return getActiveUserDef().label;
      }

      function renderUserSelect() {
        dom.userSelect.innerHTML = "";
        for (const user of state.configuredUsers) {
          const option = document.createElement("option");
          option.value = user.id;
          option.textContent = user.label;
          dom.userSelect.appendChild(option);
        }
        dom.userSelect.value = state.activeProfile;
      }

      function saveActiveProfileLocal() {
        try {
          window.localStorage.setItem(PROFILE_STORAGE_KEY, state.activeProfile);
        } catch (_err) {
          // Ignore storage failures (private mode / blocked storage).
        }
      }

      function loadActiveProfileLocal() {
        try {
          const saved = window.localStorage.getItem(PROFILE_STORAGE_KEY);
          if (
            saved &&
            state.configuredUsers.some((user) => user.id === saved)
          ) {
            state.activeProfile = saved;
          }
        } catch (_err) {
          // Ignore storage failures and keep default profile.
        }
      }

      function saveActiveGroupsLocal() {
        try {
          window.localStorage.setItem(
            GROUP_STORAGE_KEY,
            JSON.stringify(state.activeGroupByProfile)
          );
        } catch (_err) {
          // Ignore storage failures (private mode / blocked storage).
        }
      }

      function saveActiveAgentGroupsLocal() {
        try {
          window.localStorage.setItem(
            AGENT_GROUP_STORAGE_KEY,
            JSON.stringify(state.activeAgentGroupByProfile)
          );
        } catch (_err) {
          // Ignore storage failures.
        }
      }

      function loadActiveGroupsLocal() {
        try {
          const raw = window.localStorage.getItem(GROUP_STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            for (const user of state.configuredUsers) {
              if (typeof parsed[user.id] === "string") {
                state.activeGroupByProfile[user.id] = parsed[user.id];
              }
            }
          }
        } catch (_err) {
          // Ignore storage failures and keep defaults.
        }
      }

      function loadActiveAgentGroupsLocal() {
        try {
          const raw = window.localStorage.getItem(AGENT_GROUP_STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            for (const user of state.configuredUsers) {
              if (typeof parsed[user.id] === "string") {
                state.activeAgentGroupByProfile[user.id] = parsed[user.id];
              }
            }
          }
        } catch (_err) {
          // Ignore storage failures.
        }
      }

      function switchProfile(profileId) {
        return (async () => {
        if (!state.configuredUsers.some((user) => user.id === profileId)) return;
        if (state.activeProfile === profileId) return;
        const okToSwitch = await confirmDiscardAgentChangesIfNeeded();
        if (!okToSwitch) return;
        state.activeProfile = profileId;
        initProfileState(profileId);
        state.editingId = null;
        clearUndoSnapshot();
        if (dom.contextDialog.open) {
          closeDialog();
        }
        ensureActiveGroupIsValid();
        ensureActiveAgentGroupIsValid();
        void loadAgentsForProfile(profileId).then(() => {
          if (state.activeProfile === profileId && state.activeMode === "agents") {
            render();
          }
        }).catch(() => {
          if (state.activeProfile === profileId && state.activeMode === "agents") {
            setStatus("Could not load agents from server", true);
          }
        });
        renderUserSelect();
        saveActiveProfileLocal();
        syncSearchInputFromState();
        render();
        if (state.activeMode === "agents") {
          setStatus(
            `Viewing ${getActiveProfileLabel()}'s agents in ${getActiveAgentGroupLabel()}`
          );
        } else {
          setStatus(
            `Viewing ${getActiveProfileLabel()}'s prompts in ${getActiveGroupLabel()}`
          );
        }
        })();
      }

      function setUndoSnapshot(snapshot, undoStatusMessage) {
        state.undoSnapshot = snapshot && snapshot.length >= 0 ? snapshot : null;
        state.undoStatusMessage = undoStatusMessage || "Undid last action";
        dom.btnUndoStatus.hidden = !state.undoSnapshot;
      }

      function clearUndoSnapshot() {
        state.undoSnapshot = null;
        state.undoStatusMessage = "";
        dom.btnUndoStatus.hidden = true;
      }

      function setStatus(message, isError = false) {
        const normalizedMessage =
          typeof message === "string" ? message.replace(/\.$/, "") : "";
        dom.statusText.textContent = normalizedMessage;
        dom.statusText.style.color = isError ? "#fca5a5" : "#93c5fd";
      }

      function truncateStatusName(name, maxLen = 30) {
        const safeName = typeof name === "string" ? name : "";
        if (safeName.length <= maxLen) return safeName;
        return `${safeName.slice(0, maxLen)}...`;
      }

      function generateId(prefix = "ctx") {
        return (
          prefix +
          "-" +
          Date.now().toString(36) +
          "-" +
          Math.random().toString(36).slice(2, 7)
        );
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function sanitizeLoadedGroups(value) {
        if (!Array.isArray(value)) return [];
        const cleaned = [];
        for (const entry of value) {
          if (!entry || typeof entry !== "object") continue;
          const name = typeof entry.name === "string" ? entry.name.trim() : "";
          if (!name) continue;
          cleaned.push({
            id: typeof entry.id === "string" ? entry.id : generateId("grp"),
            name,
            createdAt:
              typeof entry.createdAt === "string" ? entry.createdAt : nowIso(),
            order:
              typeof entry.order === "number" && Number.isFinite(entry.order)
                ? entry.order
                : cleaned.length,
          });
        }
        cleaned.sort((a, b) => a.order - b.order);
        return cleaned;
      }

      function ensureDefaultGroup(groups) {
        const existing = groups.find((g) => g.id === DEFAULT_GROUP_ID);
        if (existing) return groups;
        return [
          ...groups,
          {
            id: DEFAULT_GROUP_ID,
            name: "Unsorted",
            createdAt: nowIso(),
            order: groups.length,
          },
        ];
      }

      function sanitizeLoadedBlocks(value, groups) {
        if (!Array.isArray(value)) return [];
        const groupIds = new Set(groups.map((g) => g.id));
        const cleaned = [];
        for (const entry of value) {
          if (!entry || typeof entry !== "object") continue;
          const name = typeof entry.name === "string" ? entry.name.trim() : "";
          const description =
            typeof entry.description === "string" ? entry.description.trim() : "";
          const contextText =
            typeof entry.contextText === "string" ? entry.contextText : "";
          if (!name || !description || !contextText.trim()) continue;

          const rawGroupId =
            typeof entry.groupId === "string"
              ? entry.groupId
              : typeof entry.collectionId === "string"
                ? entry.collectionId
                : "";
          const groupId = groupIds.has(rawGroupId) ? rawGroupId : DEFAULT_GROUP_ID;

          cleaned.push({
            id: typeof entry.id === "string" ? entry.id : generateId("ctx"),
            name,
            description,
            contextText,
            groupId,
            createdAt:
              typeof entry.createdAt === "string" ? entry.createdAt : nowIso(),
            updatedAt:
              typeof entry.updatedAt === "string" ? entry.updatedAt : nowIso(),
            order:
              typeof entry.order === "number" && Number.isFinite(entry.order)
                ? entry.order
                : cleaned.length,
          });
        }
        cleaned.sort((a, b) => a.order - b.order);
        return cleaned;
      }

      function normalizeUserData(raw) {
        let groupsRaw = [];
        let blocksRaw = [];

        if (Array.isArray(raw)) {
          blocksRaw = raw;
        } else if (raw && typeof raw === "object") {
          if (Array.isArray(raw.groups)) groupsRaw = raw.groups;
          if (Array.isArray(raw.blocks)) blocksRaw = raw.blocks;
          else if (Array.isArray(raw.prompts)) blocksRaw = raw.prompts;
        }

        let groups = sanitizeLoadedGroups(groupsRaw);
        groups = ensureDefaultGroup(groups);
        const blocks = sanitizeLoadedBlocks(blocksRaw, groups);
        return { groups, blocks };
      }

      function getPayload() {
        const usersPayload = {};
        for (const user of state.configuredUsers) {
          initProfileState(user.id);
          usersPayload[user.id] = {
            groups: withReindexedOrder(state.groups[user.id]),
            blocks: withReindexedOrder(state.profiles[user.id]),
          };
        }
        return {
          schemaVersion: 3,
          exportedAt: nowIso(),
          users: usersPayload,
        };
      }

      function getGroupById(groupId) {
        return getActiveGroups().find((group) => group.id === groupId) || null;
      }

      function getGroupLabel(groupId) {
        if (groupId === GROUP_ALL_ID) return "All prompts";
        const group = getGroupById(groupId);
        return group ? group.name : "Unsorted";
      }

      function getActiveGroupLabel() {
        return getGroupLabel(getActiveGroupId());
      }

      function getAgentGroupBuckets() {
        const groups = new Map();
        for (const agent of getActiveAgents()) {
          const groupName = agent.group || AGENT_GROUP_UNSORTED_ID;
          if (!groups.has(groupName)) groups.set(groupName, 0);
          groups.set(groupName, (groups.get(groupName) || 0) + 1);
        }
        return Array.from(groups.entries())
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => a.name.localeCompare(b.name));
      }

      function getActiveAgentGroupLabel() {
        const groupId = getActiveAgentGroupId();
        if (groupId === AGENT_GROUP_ALL_ID) return "All agents";
        if (groupId === AGENT_GROUP_UNSORTED_ID) return "Unsorted";
        return groupId;
      }

      function ensureActiveGroupIsValid() {
        const groupId = getActiveGroupId();
        if (groupId === GROUP_ALL_ID) return;
        const exists = getActiveGroups().some((group) => group.id === groupId);
        if (!exists) {
          setActiveGroupId(GROUP_ALL_ID);
        }
      }

      function ensureActiveAgentGroupIsValid() {
        const groupId = getActiveAgentGroupId();
        if (groupId === AGENT_GROUP_ALL_ID) return;
        if (groupId === AGENT_GROUP_UNSORTED_ID) return;
        const exists = getAgentGroupBuckets().some((group) => group.name === groupId);
        if (!exists) {
          setActiveAgentGroupId(AGENT_GROUP_ALL_ID);
        }
      }

      function getActiveSearchTerm() {
        return getActiveModeSearchTerm();
      }

      function syncSearchInputFromState() {
        dom.searchInput.value = getActiveModeSearchTerm();
        dom.searchInput.placeholder =
          state.activeMode === "agents" ? "Search agents..." : "Search prompts...";
      }

      function getVisibleBlocks() {
        const allBlocks = getActiveBlocks();
        const selectedGroupId = getActiveGroupId();
        const query = (state.searchByProfile[state.activeProfile] || "")
          .trim()
          .toLowerCase();

        return allBlocks.filter((block) => {
          const inGroup =
            selectedGroupId === GROUP_ALL_ID || block.groupId === selectedGroupId;
          if (!inGroup) return false;
          if (!query) return true;
          return (
            block.name.toLowerCase().includes(query) ||
            block.description.toLowerCase().includes(query) ||
            block.contextText.toLowerCase().includes(query)
          );
        });
      }

      function getVisibleAgents() {
        const allAgents = getActiveAgents();
        const selectedGroup = getActiveAgentGroupId();
        const query = (state.agentSearchByProfile[state.activeProfile] || "")
          .trim()
          .toLowerCase();

        return allAgents.filter((agent) => {
          const normalizedGroup = agent.group || AGENT_GROUP_UNSORTED_ID;
          const inGroup =
            selectedGroup === AGENT_GROUP_ALL_ID || normalizedGroup === selectedGroup;
          if (!inGroup) return false;
          if (!query) return true;
          return (
            agent.title.toLowerCase().includes(query) ||
            (agent.description || "").toLowerCase().includes(query) ||
            normalizedGroup.toLowerCase().includes(query)
          );
        });
      }

      function updateCountLabel() {
        if (state.activeMode === "agents") {
          const visibleCount = getVisibleAgents().length;
          const itemLabel = visibleCount === 1 ? "1 agent" : `${visibleCount} agents`;
          const searchLabel = getActiveSearchTerm().trim() ? " - filtered" : "";
          dom.countLabel.textContent =
            `${itemLabel} in ${getActiveAgentGroupLabel()} (${getActiveProfileLabel()})${searchLabel}`;
          return;
        }
        const visibleCount = getVisibleBlocks().length;
        const itemLabel = visibleCount === 1 ? "1 prompt" : `${visibleCount} prompts`;
        const searchLabel = getActiveSearchTerm().trim() ? " - filtered" : "";
        dom.countLabel.textContent =
          `${itemLabel} in ${getActiveGroupLabel()} (${getActiveProfileLabel()})${searchLabel}`;
      }

      function renderGroups() {
        dom.groupsContainer.innerHTML = "";
        const promptSectionTitle = document.createElement("div");
        promptSectionTitle.className = "nav-section-title";
        promptSectionTitle.textContent = "Prompts";
        dom.groupsContainer.appendChild(promptSectionTitle);

        const allBlocksCount = getActiveBlocks().length;
        const promptAllButton = document.createElement("button");
        promptAllButton.type = "button";
        promptAllButton.className =
          "group-item" +
          (state.activeMode === "prompts" && getActiveGroupId() === GROUP_ALL_ID
            ? " active"
            : "");
        promptAllButton.innerHTML =
          `<span class="group-name">All Prompts</span><span class="group-count">${allBlocksCount}</span>`;
        promptAllButton.addEventListener("click", () => {
          void (async () => {
          if (state.activeMode === "agents") {
            const okToLeave = await confirmDiscardAgentChangesIfNeeded();
            if (!okToLeave) return;
          }
          state.activeMode = "prompts";
          setActiveGroupId(GROUP_ALL_ID);
          saveActiveGroupsLocal();
          syncSearchInputFromState();
          render();
          setStatus(`Showing all prompts for ${getActiveProfileLabel()}`);
          })();
        });
        wireGroupDropTarget(promptAllButton, GROUP_ALL_ID);
        dom.groupsContainer.appendChild(promptAllButton);

        for (const group of getActiveGroups()) {
          const groupCount = getActiveBlocks().filter(
            (block) => block.groupId === group.id
          ).length;
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "group-item" +
            (state.activeMode === "prompts" && getActiveGroupId() === group.id
              ? " active"
              : "");
          button.innerHTML =
            `<span class="group-name">${escapeHtml(group.name)}</span><span class="group-count">${groupCount}</span>`;
          button.addEventListener("click", () => {
            void (async () => {
            if (state.activeMode === "agents") {
              const okToLeave = await confirmDiscardAgentChangesIfNeeded();
              if (!okToLeave) return;
            }
            state.activeMode = "prompts";
            setActiveGroupId(group.id);
            saveActiveGroupsLocal();
            syncSearchInputFromState();
            render();
            setStatus(`Viewing ${getActiveProfileLabel()}'s ${group.name} prompts`);
            })();
          });
          wireGroupDropTarget(button, group.id);
          dom.groupsContainer.appendChild(button);
        }

        const agentSectionTitle = document.createElement("div");
        agentSectionTitle.className = "nav-section-title";
        agentSectionTitle.textContent = "Agents";
        dom.groupsContainer.appendChild(agentSectionTitle);

        const allAgentsCount = getActiveAgents().length;
        const agentAllButton = document.createElement("button");
        agentAllButton.type = "button";
        agentAllButton.className =
          "group-item" +
          (state.activeMode === "agents" &&
          getActiveAgentGroupId() === AGENT_GROUP_ALL_ID
            ? " active"
            : "");
        agentAllButton.innerHTML =
          `<span class="group-name">All Agents</span><span class="group-count">${allAgentsCount}</span>`;
        agentAllButton.addEventListener("click", () => {
          void (async () => {
          if (
            state.activeMode === "agents" &&
            getActiveAgentGroupId() !== AGENT_GROUP_ALL_ID
          ) {
            const okToSwitch = await confirmDiscardAgentChangesIfNeeded();
            if (!okToSwitch) return;
          }
          state.activeMode = "agents";
          setActiveAgentGroupId(AGENT_GROUP_ALL_ID);
          saveActiveAgentGroupsLocal();
          syncSearchInputFromState();
          render();
          setStatus(`Showing all agents for ${getActiveProfileLabel()}`);
          })();
        });
        dom.groupsContainer.appendChild(agentAllButton);

        const agentGroups = getAgentGroupBuckets();
        const unsortedCount = getActiveAgents().filter(
          (agent) => !agent.group || agent.group === AGENT_GROUP_UNSORTED_ID
        ).length;
        if (unsortedCount > 0) {
          const unsortedBtn = document.createElement("button");
          unsortedBtn.type = "button";
          unsortedBtn.className =
            "group-item" +
            (state.activeMode === "agents" &&
            getActiveAgentGroupId() === AGENT_GROUP_UNSORTED_ID
              ? " active"
              : "");
          unsortedBtn.innerHTML =
            `<span class="group-name">Unsorted</span><span class="group-count">${unsortedCount}</span>`;
          unsortedBtn.addEventListener("click", () => {
            void (async () => {
            if (
              state.activeMode === "agents" &&
              getActiveAgentGroupId() !== AGENT_GROUP_UNSORTED_ID
            ) {
              const okToSwitch = await confirmDiscardAgentChangesIfNeeded();
              if (!okToSwitch) return;
            }
            state.activeMode = "agents";
            setActiveAgentGroupId(AGENT_GROUP_UNSORTED_ID);
            saveActiveAgentGroupsLocal();
            syncSearchInputFromState();
            render();
            setStatus(`Viewing ${getActiveProfileLabel()}'s unsorted agents`);
            })();
          });
          dom.groupsContainer.appendChild(unsortedBtn);
        }

        for (const agentGroup of agentGroups) {
          if (agentGroup.name === AGENT_GROUP_UNSORTED_ID) continue;
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "group-item" +
            (state.activeMode === "agents" &&
            getActiveAgentGroupId() === agentGroup.name
              ? " active"
              : "");
          button.innerHTML =
            `<span class="group-name">${escapeHtml(agentGroup.name)}</span><span class="group-count">${agentGroup.count}</span>`;
          button.addEventListener("click", () => {
            void (async () => {
            if (
              state.activeMode === "agents" &&
              getActiveAgentGroupId() !== agentGroup.name
            ) {
              const okToSwitch = await confirmDiscardAgentChangesIfNeeded();
              if (!okToSwitch) return;
            }
            state.activeMode = "agents";
            setActiveAgentGroupId(agentGroup.name);
            saveActiveAgentGroupsLocal();
            syncSearchInputFromState();
            render();
            setStatus(`Viewing ${getActiveProfileLabel()}'s ${agentGroup.name} agents`);
            })();

      function wireGroupDropTarget(element, groupId) {
        element.addEventListener("dragover", (event) => {
          if (!dragState.draggedId) return;
          if (groupId === GROUP_ALL_ID) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
          element.classList.add("drop-target");
        });

        element.addEventListener("dragleave", (event) => {
          const related = event.relatedTarget;
          if (related && element.contains(related)) return;
          element.classList.remove("drop-target");
        });

        element.addEventListener("drop", (event) => {
          if (!dragState.draggedId) return;
          event.preventDefault();
          element.classList.remove("drop-target");
          if (groupId === GROUP_ALL_ID) {
            setStatus("Drop on a specific group to move a prompt");
            return;
          }
          moveBlockToGroup(dragState.draggedId, groupId);
          clearDropMarkers();
        });
      }

        const promptUiMap = getPromptUiMap();
        const existingUi = promptUiMap[block.id] || null;
        let savedPromptText = block.contextText;
        let isPromptDirty = false;
        let isExpandedState = !!(existingUi && existingUi.isExpanded);
        if (existingUi && typeof existingUi.draftText === "string") {
          promptEditor.value = existingUi.draftText;
          isPromptDirty = promptEditor.value !== savedPromptText;
        }

        function persistPromptUiState() {
          promptUiMap[block.id] = {
            isExpanded: isExpandedState,
            isDirty: isPromptDirty,
            draftText: promptEditor.value,
          };
        }

        function updateInlinePromptState() {
          savePromptBtn.disabled = !isPromptDirty;
          cancelPromptBtn.disabled = !isPromptDirty;
          promptEditor.classList.toggle("is-dirty", isPromptDirty);
          persistPromptUiState();
        }

        function refreshDirtyFlag() {
          isPromptDirty = promptEditor.value !== savedPromptText;
          updateInlinePromptState();
        }

        async function persistInlinePromptText() {
          refreshDirtyFlag();
          if (!isPromptDirty) return true;

          const activeBlocks = getActiveBlocks();
          const idx = activeBlocks.findIndex((item) => item.id === block.id);
          if (idx < 0) return false;

          const previousBlocks = cloneBlocks(activeBlocks);
          activeBlocks[idx] = {
            ...activeBlocks[idx],
            contextText: promptEditor.value,
            updatedAt: nowIso(),
          };
          setActiveBlocks(activeBlocks);
          block.contextText = promptEditor.value;
          savedPromptText = promptEditor.value;
          isPromptDirty = false;
          updateInlinePromptState();
          setUndoSnapshot(
            previousBlocks,
            `Restored "${truncateStatusName(block.name)}"`
          );

          try {
            await saveToServer();
            setStatus(`Saved "${truncateStatusName(block.name)}"`);
            return true;
          } catch (_err) {
            setStatus("Autosave failed: Server may not be running", true);
            return false;
          }
        }

        async function confirmDiscardPromptChanges() {
          if (!isPromptDirty) return true;
          const choice = await askChoiceDialog({
            title: "Discard changes?",
            message: "You have unsaved changes.",
            primaryLabel: "Discard Changes",
            secondaryLabel: "Keep Editing",
          });
          if (choice !== "primary") return false;
          promptEditor.value = savedPromptText;
          isPromptDirty = false;
          updateInlinePromptState();
          return true;
        }

        async function copyPromptTextWithDirtyHandling(anchorEl) {
          refreshDirtyFlag();
          if (!isPromptDirty) {
            await copyText(
              promptEditor.value,
              `Copied "${block.name}" to clipboard.`,
              anchorEl
            );
            return;
          }

          const choice = await askChoiceDialog({
            title: "You have unsaved changes.",
            message: "Choose how to copy this prompt text.",
            primaryLabel: "Save and Copy",
            secondaryLabel: "Cancel",
            tertiaryLabel: "Copy Without Saving",
          });

          if (choice === "primary") {
            const saved = await persistInlinePromptText();
            if (!saved) return;
            await copyText(
              promptEditor.value,
              `Copied "${block.name}" to clipboard.`,
              anchorEl
            );
            return;
          }

          if (choice === "tertiary") {
            await copyText(
              promptEditor.value,
              `Copied "${block.name}" to clipboard.`,
              anchorEl
            );
          }
        }

        function syncCardDraggable() {
          card.draggable = true;
        }

        function applyExpandedVisual(isOpen) {
          body.classList.toggle("open", isOpen);
          arrowBtn.setAttribute("aria-expanded", String(isOpen));
          arrowBtn.innerHTML = isOpen ? "&#9652;" : "&#9662;";
          isExpandedState = isOpen;
          persistPromptUiState();
        }

        async function setExpanded(isOpen) {
          if (!isOpen && body.classList.contains("open")) {
            const okToClose = await confirmDiscardPromptChanges();
            if (!okToClose) return;
          }
          applyExpandedVisual(isOpen);
          syncCardDraggable();

        arrowBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          void setExpanded(!body.classList.contains("open"));

        card.addEventListener("click", (event) => {

          if (!(target instanceof Element)) return;
          if (target.closest("button")) return;
          if (target.closest(".row-actions")) return;
          if (target.closest(".context-body")) return;
          void setExpanded(!body.classList.contains("open"));
        });

        quickCopyBtn.addEventListener("click", (event) =>
          copyText(block.contextText, `Copied "${block.name}" to clipboard.`, event.currentTarget)
        );

        savePromptBtn.addEventListener("click", () => {
          void persistInlinePromptText();
        });
        copyPromptBtn.addEventListener("click", () => {
          void copyPromptTextWithDirtyHandling(copyPromptBtn);
        });
        cancelPromptBtn.addEventListener("click", () => {
          void confirmDiscardPromptChanges();
        });
        promptEditor.addEventListener("input", refreshDirtyFlag);

        editBtn.addEventListener("click", () => openEditDialog(block.id));
        deleteBtn.addEventListener("click", () => deleteBlock(block.id));

        card.addEventListener("dragstart", (event) => {
          if (
            event.target &&
            (event.target.closest("button") ||
              event.target.closest("textarea") ||
              event.target.closest("input") ||
              event.target.closest("select"))
          ) {
            event.preventDefault();
            return;
          }
          dragState.draggedId = block.id;
          card.classList.add("dragging");
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", block.id);
          }
        });

        card.addEventListener("dragover", (event) => {
          if (!dragState.draggedId || dragState.draggedId === block.id) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
          const rect = card.getBoundingClientRect();
          const insertBefore = event.clientY < rect.top + rect.height / 2;
          updateDropMarker(card, insertBefore);
        });

        card.addEventListener("dragleave", (event) => {
          if (event.currentTarget !== card) return;
          const related = event.relatedTarget;
          if (related && card.contains(related)) return;
          card.classList.remove("drop-before", "drop-after");
        });

        card.addEventListener("drop", (event) => {
          if (!dragState.draggedId || dragState.draggedId === block.id) return;
          event.preventDefault();
          const rect = card.getBoundingClientRect();
          const insertBefore = event.clientY < rect.top + rect.height / 2;
          moveBlock(dragState.draggedId, block.id, insertBefore);
          clearDropMarkers();
        });

        card.addEventListener("dragend", () => {
          dragState.draggedId = null;
          card.classList.remove("dragging");
          clearDropMarkers();
        });

        card.appendChild(header);
        card.appendChild(body);
        applyExpandedVisual(isExpandedState);
        syncCardDraggable();
        updateInlinePromptState();
        return card;
      }

              event.target.closest("select"))
          ) {

          }
        });

        card.addEventListener("dragover", (event) => {
          if (!dragState.draggedId || dragState.draggedId === agentKey) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
          const rect = card.getBoundingClientRect();
          const insertBefore = event.clientY < rect.top + rect.height / 2;
          updateDropMarker(card, insertBefore);
        });

        card.addEventListener("dragleave", (event) => {
          if (event.currentTarget !== card) return;
          const related = event.relatedTarget;
          if (related && card.contains(related)) return;
          card.classList.remove("drop-before", "drop-after");
        });

        card.addEventListener("drop", (event) => {

          event.preventDefault();
          const rect = card.getBoundingClientRect();
          const insertBefore = event.clientY < rect.top + rect.height / 2;
          moveAgent(dragState.draggedId, agentKey, insertBefore);

          card.classList.remove("dragging");
          clearDropMarkers();
